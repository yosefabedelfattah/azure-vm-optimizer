<script>

var TENANT = 'YOUR_TENANT_ID';
var CLIENT = 'YOUR_CLIENT_ID';
// =============================================================

// Cloud endpoints — set dynamically based on user selection
var CLOUDS = {
  commercial: {
    label:  'Azure Commercial',
    mgmt:   'https://management.azure.com',
    auth:   'https://login.microsoftonline.com',
    scope:  'https://management.azure.com/user_impersonation offline_access',
    badge:  '#2563eb',
    badgeBg:'#eff6ff'
  },
  government: {
    label:  'Azure Government (ITAR)',
    mgmt:   'https://management.usgovcloudapi.net',
    auth:   'https://login.microsoftonline.us',
    scope:  'https://management.usgovcloudapi.net/user_impersonation offline_access',
    badge:  '#b91c1c',
    badgeBg:'#fef2f2'
  }
};

var CLOUD = 'commercial'; // default
function cloud(){ return CLOUDS[CLOUD]; }
var MGMT = '';

var CAT = {
  'Standard_B1s':{v:1,r:1,c:0.011},'Standard_B2ms':{v:2,r:8,c:0.083},
  'Standard_B4ms':{v:4,r:16,c:0.166},'Standard_B8ms':{v:8,r:32,c:0.333},
  'Standard_D2s_v3':{v:2,r:8,c:0.096},'Standard_D4s_v3':{v:4,r:16,c:0.192},
  'Standard_D8s_v3':{v:8,r:32,c:0.384},'Standard_D2s_v5':{v:2,r:8,c:0.096},
  'Standard_D4s_v5':{v:4,r:16,c:0.192},'Standard_D8s_v5':{v:8,r:32,c:0.384},
  'Standard_D16s_v5':{v:16,r:64,c:0.768},
  'Standard_D2ads_v5':{v:2,r:8,c:0.096},'Standard_D4ads_v5':{v:4,r:16,c:0.192},
  'Standard_D8ads_v5':{v:8,r:32,c:0.384},'Standard_D16ads_v5':{v:16,r:64,c:0.768},
  'Standard_D32ads_v5':{v:32,r:128,c:1.536},
  'Standard_E2s_v3':{v:2,r:16,c:0.126},'Standard_E4s_v3':{v:4,r:32,c:0.252},
  'Standard_E8s_v3':{v:8,r:64,c:0.504},'Standard_E16s_v3':{v:16,r:128,c:1.008},
  'Standard_E2ads_v5':{v:2,r:16,c:0.126},'Standard_E4ads_v5':{v:4,r:32,c:0.252},
  'Standard_E8ads_v5':{v:8,r:64,c:0.504},'Standard_E16ads_v5':{v:16,r:128,c:1.008},
  'Standard_F2s_v2':{v:2,r:4,c:0.085},'Standard_F4s_v2':{v:4,r:8,c:0.170},
  'Standard_F8s_v2':{v:8,r:16,c:0.338},'Standard_F16s_v2':{v:16,r:32,c:0.676}

var SEV = {
  critical:{bg:'#fef2f2',bd:'#fca5a5',tx:'#dc2626',lb:'CRITICAL'},
  high:    {bg:'#fff7ed',bd:'#fdba74',tx:'#ea580c',lb:'HIGH'},
  medium:  {bg:'#fffbeb',bd:'#fcd34d',tx:'#d97706',lb:'MEDIUM'},
  low:     {bg:'#eff6ff',bd:'#93c5fd',tx:'#2563eb',lb:'LOW'},
  info:    {bg:'#f5f3ff',bd:'#c4b5fd',tx:'#7c3aed',lb:'INFO'}
};

// helpers
function avg(a){return a.length?a.reduce(function(x,y){return x+y;},0)/a.length:0;}
function sumArr(a){return a.reduce(function(x,y){return x+y;},0);}
function r2(v){return Math.round(v*100)/100;}
function r1(v){return Math.round(v*10)/10;}
function pctile(a,p){if(!a.length)return 0;var s=a.slice().sort(function(x,y){return x-y;});return s[Math.floor(p/100*s.length)]||0;}
function scC(s){return s>=80?'#16a34a':s>=60?'#d97706':'#dc2626';}
function scBg(s){return s>=80?'#f0fdf4':s>=60?'#fffbeb':'#fef2f2';}

// state
var S = {
  phase:'auth', token:null,
  subs:[], selSub:null, rgs:[], selRG:null, vms:[], selVM:null,
  vmDetail:null, metrics:null, report:null,
  tab:'overview', busy:false, err:null, subQ:''
};
function set(p){Object.assign(S,p);draw();}

// azure fetch
function azGet(url) {
  return fetch(url,{headers:{Authorization:'Bearer '+S.token}}).then(function(r){
    if(!r.ok){return r.text().then(function(t){throw new Error('Azure '+r.status+': '+t.slice(0,200));});}
    return r.json();
  });
}

// azure mgmt url helper
function mgmt(path){ return cloud().mgmt + path; }

// PKCE
function genV(){var a=new Uint8Array(32);crypto.getRandomValues(a);return btoa(String.fromCharCode.apply(null,a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
function genC(v){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)).then(function(h){return btoa(String.fromCharCode.apply(null,new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');});}

function startLogin(){
  var v=genV();
  genC(v).then(function(ch){
    var red=location.href.split('?')[0].split('#')[0];
    sessionStorage.setItem('pv',v);
    sessionStorage.setItem('pr',red);
    sessionStorage.setItem('pc',CLOUD);
    var p=new URLSearchParams({
      client_id:CLIENT,response_type:'code',redirect_uri:red,
      scope:cloud().scope,
      code_challenge:ch,code_challenge_method:'S256',response_mode:'query'
    });
    location.href=cloud().auth+'/'+TENANT+'/oauth2/v2.0/authorize?'+p;
  });
}

function handleCB(){
  var p=new URLSearchParams(location.search);
  var code=p.get('code');
  if(p.get('error')){set({err:p.get('error_description')||p.get('error'),phase:'auth'});return;}
  if(!code)return;
  var v=sessionStorage.getItem('pv');
  var red=sessionStorage.getItem('pr');
  var savedCloud=sessionStorage.getItem('pc')||'commercial';
  sessionStorage.removeItem('pv');sessionStorage.removeItem('pr');sessionStorage.removeItem('pc');
  CLOUD=savedCloud;
  history.replaceState({},'',location.pathname);
  set({busy:true,phase:'auth'});
  fetch(CLOUDS[savedCloud].auth+'/'+TENANT+'/oauth2/v2.0/token',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({client_id:CLIENT,code:code,redirect_uri:red,grant_type:'authorization_code',code_verifier:v})
  }).then(function(r){return r.json();}).then(function(d){
    if(!d.access_token){throw new Error(d.error_description||d.error||'Token exchange failed');}
    S.token=d.access_token;
    return azGet(CLOUDS[savedCloud].mgmt+'/subscriptions?api-version=2022-12-01');
  }).then(function(s){
    set({subs:s.value||[],phase:'browse',busy:false,err:null});
  }).catch(function(e){set({err:e.message,phase:'auth',busy:false});});
}

// metrics
function fetchMetrics(vmId){
  var end=new Date().toISOString();
  var start=new Date(Date.now()-7*24*3600*1000).toISOString();
  var ts=start+'/'+end;
  var batches=[
    ['Percentage CPU'],
    ['Network In Total','Network Out Total'],
    ['Network In','Network Out'],
    ['Disk Read Bytes/sec','Disk Write Bytes/sec'],
    ['Disk Read Bytes','Disk Write Bytes'],
    ['Disk Read Operations/Sec','Disk Write Operations/Sec'],
    ['OS Disk Read Bytes/sec','OS Disk Write Bytes/sec'],
    ['OS Disk Read Operations/Sec','OS Disk Write Operations/Sec'],
    ['Data Disk Read Bytes/sec','Data Disk Write Bytes/sec'],
    ['Data Disk Read Operations/Sec','Data Disk Write Operations/Sec']
  ];
  var all=[];
  var seen={};
  var chain=Promise.resolve();
  batches.forEach(function(batch){
    var key=batch[0].toLowerCase().replace(/[\s/]/g,'').replace('sec','').replace('total','').replace('bytes','');
    if(seen[key])return;
    chain=chain.then(function(){
      return azGet(
        mgmt(vmId)+'/providers/Microsoft.Insights/metrics?api-version=2023-10-01' +
        '&timespan='+ts+'&interval=PT1H' +
        '&metricnames='+encodeURIComponent(batch.join(',')) +
        '&aggregation=Average,Maximum,Minimum'
      ).then(function(r){
        var valid=(r.value||[]).filter(function(m){
          return m.timeseries&&m.timeseries[0]&&m.timeseries[0].data&&
            m.timeseries[0].data.some(function(d){return d.average!=null;});
        });
        if(valid.length){valid.forEach(function(v){all.push(v);});seen[key]=1;}
      }).catch(function(){});
    });
  });
  return chain.then(function(){
    return azGet(
      mgmt(vmId)+'/providers/Microsoft.Insights/metrics?api-version=2023-10-01' +
      '&timespan='+ts+'&interval=PT1H' +
      '&metricnames=Available%20Memory%20Bytes&aggregation=Average'
    ).then(function(r){return {all:all,mem:r.value&&r.value[0]||null};})
     .catch(function(){return {all:all,mem:null};});
  });
}

function procMetrics(vals,memM,detail){
  function gm(){
    for(var i=0;i<arguments.length;i++){
      var n=arguments[i];
      for(var j=0;j<vals.length;j++){
        if(vals[j].name.value===n||vals[j].name.localizedValue===n)return vals[j];
      }
    }
    return null;
  }
  function pts(m){return m&&m.timeseries&&m.timeseries[0]&&m.timeseries[0].data||[];}
  function avgs(m){return pts(m).map(function(d){return d.average;}).filter(function(v){return v!=null;});}
  function maxs(m){return pts(m).map(function(d){return d.maximum||d.average||0;});}

  var cpu=gm('Percentage CPU');
  var ca=avgs(cpu);
  var cm=maxs(cpu);
  var cpuAvg=r1(avg(ca));
  var cpuMax=r1(cm.length?Math.max.apply(null,cm):0);
  var ca2=ca.filter(function(v){return v>0;});
  var cpuMin=r1(ca2.length?Math.min.apply(null,ca2):0);
  var cpuP95=r1(pctile(ca,95));
  var vmSize=detail.properties&&detail.properties.hardwareProfile&&detail.properties.hardwareProfile.vmSize||'Unknown';
  var si=CAT[vmSize]||{v:2,r:8,c:0.096};
  var memPct=null;
  if(memM){var ma=avg(avgs(memM));if(ma>0)memPct=r1(((si.r*1073741824-ma)/(si.r*1073741824))*100);}

  var diskR=gm('Disk Read Bytes/sec','Disk Read Bytes','OS Disk Read Bytes/sec');
  var diskW=gm('Disk Write Bytes/sec','Disk Write Bytes','OS Disk Write Bytes/sec');
  var diskRO=gm('Disk Read Operations/Sec','OS Disk Read Operations/Sec');
  var diskWO=gm('Disk Write Operations/Sec','OS Disk Write Operations/Sec');
  var ddR=gm('Data Disk Read Bytes/sec','Data Disk Read Bytes');
  var ddW=gm('Data Disk Write Bytes/sec','Data Disk Write Bytes');
  var ddRO=gm('Data Disk Read Operations/Sec');
  var ddWO=gm('Data Disk Write Operations/Sec');
  var netIn=gm('Network In Total','Network In');
  var netOut=gm('Network Out Total','Network Out');
  var MB=1048576;
  function mk(m,d){d=d||1;var a=avgs(m);return r2(a.length?avg(a)/d:0);}
  function mx(m,d){d=d||1;var a=avgs(m);return r2(a.length?Math.max.apply(null,a)/d:0);}

  var dm={};
  pts(cpu).forEach(function(d){
    if(d.average==null)return;
    var day=d.timeStamp.slice(0,10);
    if(!dm[day])dm[day]=[];
    dm[day].push(d.average);
  });
  var chart=Object.keys(dm).map(function(day){
    var c=dm[day];
    return{date:day.slice(5),avgCPU:r1(avg(c)),maxCPU:r1(Math.max.apply(null,c))};
  });

  return{
    vmSize:vmSize,si:si,
    cpuAvg:cpuAvg,cpuMax:cpuMax,cpuMin:cpuMin,cpuP95:cpuP95,memPct:memPct,
    avgDiskR:mk(diskR,MB),avgDiskW:mk(diskW,MB),
    avgROps:Math.round(mk(diskRO)),avgWOps:Math.round(mk(diskWO)),
    maxROps:Math.round(mx(diskRO)),maxWOps:Math.round(mx(diskWO)),
    avgDdR:mk(ddR,MB),avgDdW:mk(ddW,MB),
    avgDdROps:Math.round(mk(ddRO)),avgDdWOps:Math.round(mk(ddWO)),
    totIn:r2(sumArr(avgs(netIn))/1073741824),
    totOut:r2(sumArr(avgs(netOut))/1073741824),
    chart:chart
  };
}

function buildReport(m,detail){
  var recs=[];
  var score=100;

  if(m.cpuAvg<5){
    score-=35;
    recs.push({sev:'critical',cat:'Cost',title:'Severely underutilized CPU',detail:'Avg CPU only '+m.cpuAvg+'% over 7 days.',action:'Downsize or deallocate.',savings:'Up to 70-80% cost reduction'});
  } else if(m.cpuAvg<20&&m.cpuMax<60){
    score-=20;
    recs.push({sev:'high',cat:'Cost',title:'CPU over-provisioned',detail:'Avg: '+m.cpuAvg+'%, peak: '+m.cpuMax+'%.',action:'Consider halving vCPU count.',savings:'30-50% cost reduction'});
  } else if(m.cpuAvg>85||m.cpuMax>95){
    score-=25;
    recs.push({sev:'critical',cat:'Performance',title:'CPU saturation',detail:'Avg: '+m.cpuAvg+'%, peak: '+m.cpuMax+'%.',action:'Scale up or enable Autoscale.',savings:'N/A'});
  } else if(m.cpuAvg>70){
    score-=10;
    recs.push({sev:'medium',cat:'Performance',title:'Elevated CPU',detail:'Avg '+m.cpuAvg+'%.',action:'Plan scale-up.',savings:'Preventive'});
  }

  if(m.memPct!==null){
    if(m.memPct>85){
      score-=20;
      recs.push({sev:'critical',cat:'Memory',title:'High memory pressure',detail:m.memPct+'% used.',action:'Upgrade to E-series SKU.',savings:'N/A'});
    } else if(m.memPct<20){
      score-=10;
      recs.push({sev:'medium',cat:'Memory',title:'Low memory utilization',detail:'Only '+m.memPct+'% used.',action:'Move to smaller RAM SKU.',savings:'15-30% cost reduction'});
    }
  }

  if(m.avgROps<1&&m.avgWOps<1&&m.avgDiskR<0.1&&m.avgDiskW<0.1){
    score-=5;
    recs.push({sev:'low',cat:'Storage',title:'Negligible OS disk I/O',detail:'Read: '+m.avgDiskR+' MB/s, Write: '+m.avgDiskW+' MB/s.',action:'Downgrade to Standard SSD.',savings:'$15-30/month'});
  } else if(m.maxROps>5000||m.maxWOps>5000){
    score-=10;
    recs.push({sev:'medium',cat:'Storage',title:'Peak IOPS are high',detail:'Peak Read: '+m.maxROps+', Write: '+m.maxWOps+'.',action:'Ensure Premium SSD or Ultra Disk.',savings:'Performance'});
  }

  if(m.avgDdROps<5&&m.avgDdWOps<5&&(m.avgDdR>0||m.avgDdW>0)){
    recs.push({sev:'low',cat:'Storage',title:'Data disk low IOPS',detail:'Read: '+m.avgDdROps+', Write: '+m.avgDdWOps+' IOPS.',action:'Move to Standard HDD/SSD.',savings:'Up to 60%'});
  }

  var rs=getRightSize(m);
  if(rs&&rs.size!==m.vmSize){
    var cur=m.si.c;
    var nc=(CAT[rs.size]&&CAT[rs.size].c)||cur;
    if(nc<cur){
      var sp=Math.round((cur-nc)/cur*100);
      var sm=Math.round((cur-nc)*730);
      recs.push({sev:'high',cat:'Right-Sizing',title:'Recommended: '+rs.size,detail:m.vmSize+' -> '+rs.size+'. '+rs.reason,action:'Resize via Azure Portal -> VM -> Size.',savings:'~'+sp+'% (~$'+sm+'/mo)'});
    }
  }

  recs.push({sev:'info',cat:'Cost',title:'Consider Reserved Instances',detail:'1 or 3-year reservations unlock major discounts.',action:'Azure Portal -> Reservations.',savings:'Up to 40-72% vs PAYG'});
  recs.push({sev:'info',cat:'Governance',title:'Enable auto-shutdown',detail:'Reduces idle costs for non-prod VMs.',action:'Azure Portal -> VM -> Auto-shutdown.',savings:'Up to 60%'});

  var tags=detail.tags||{};
  var missing=['Environment','Owner','CostCenter','Application'].filter(function(t){return !tags[t];});
  if(missing.length){
    score-=5;
    recs.push({sev:'low',cat:'Governance',title:'Missing tags: '+missing.join(', '),detail:'Untagged resources make cost attribution difficult.',action:'Add standard tags.',savings:'Better governance'});
  }

  recs.push({sev:'info',cat:'Tooling',title:'Enable Azure Advisor',detail:'Continuously surfaces recommendations.',action:'Navigate to Azure Advisor.',savings:'Ongoing'});

  return{score:Math.max(0,Math.round(score)),recs:recs,monthlyCost:r2(m.si.c*730),rs:rs};
}

function getRightSize(m){
  var tc=m.si.v,tr=m.si.r;
  if(m.cpuAvg<10)tc=Math.max(1,Math.floor(m.si.v/2));
  else if(m.cpuAvg>80)tc=m.si.v*2;
  if(m.memPct!==null){
    if(m.memPct<20)tr=Math.max(1,Math.floor(m.si.r/2));
    else if(m.memPct>85)tr=m.si.r*2;
  }
  var best=null,bd=Infinity;
  Object.keys(CAT).forEach(function(sz){
    var info=CAT[sz];
    if(info.v>=tc&&info.r>=tr){
      var d=(info.v-tc)*2+(info.r-tr);
      if(d<bd){bd=d;best=sz;}
    }
  });
  return best?{size:best,reason:'Target: '+tc+' vCPU / '+tr+' GB RAM.'}:null;
}

// ── DOM helpers ──────────────────────────────────────────────
function h(tag,attrs,kids){
  var e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    var v=attrs[k];
    if(k==='style'&&typeof v==='object'){Object.assign(e.style,v);}
    else if(k==='cls'){e.className=v;}
    else if(k.slice(0,2)==='on'){e.addEventListener(k.slice(2),v);}
    else{e.setAttribute(k,v);}
  });
  if(kids)(Array.isArray(kids)?kids:[kids]).forEach(function(c){
    if(c!=null)e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function div(style,kids){return h('div',{style:style},kids);}
function txt(s){return document.createTextNode(String(s));}

function card(kids,extra){
  return div(Object.assign({background:'white',borderRadius:'12px',border:'1px solid #e5e7eb',boxShadow:'0 1px 3px rgba(0,0,0,.06)',padding:'20px'},extra||{}),kids);
}
function btn(label,onclick,opts){
  opts=opts||{};
  var v=opts.variant||'primary';
  var th={
    primary:{background:'#2563eb',color:'white',border:'none'},
    secondary:{background:'white',color:'#374151',border:'1px solid #d1d5db'},
    ghost:{background:'transparent',color:'#6b7280',border:'none'}
  };
  var b=h('button',{style:Object.assign({},th[v],{
    borderRadius:'8px',cursor:opts.disabled?'not-allowed':'pointer',fontWeight:'600',
    fontSize:opts.sm?'12px':'14px',padding:opts.sm?'7px 14px':'11px 22px',
    opacity:opts.disabled?0.55:1,width:opts.full?'100%':'auto',transition:'all .15s'
  })},[label]);
  if(!opts.disabled&&onclick)b.addEventListener('click',onclick);
  return b;
}
function errBox(msg){
  if(!msg)return null;
  return div({background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:'8px',padding:'10px 14px',marginBottom:'14px',fontSize:'13px',color:'#dc2626'},['Error: '+msg]);
}
function sCard(label,val,unit,sub,color,warn){
  return div({background:'white',borderRadius:'12px',border:'1.5px solid '+(warn?'#fca5a5':'#e5e7eb'),padding:'16px',textAlign:'center'},[
    div({fontSize:'11px',color:'#6b7280',fontWeight:'700',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:'6px'},[label]),
    div({fontSize:'24px',fontWeight:'900',color:color||'#1d4ed8',lineHeight:'1'},[String(val),unit?h('span',{style:{fontSize:'12px',color:'#6b7280',marginLeft:'2px'}},[unit]):null].filter(Boolean)),
    sub?div({fontSize:'11px',color:'#9ca3af',marginTop:'4px'},[sub]):null
  ].filter(Boolean));
}
function rowItem(k,v){
  return div({display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #f3f4f6',fontSize:'13px'},[
    h('span',{style:{color:'#6b7280'}},[k]),
    h('span',{style:{fontWeight:'600',color:'#111827',maxWidth:'240px',textAlign:'right',wordBreak:'break-all'}},[String(v||'--')])
  ]);
}
function barTbl(rows){
  var vals=rows.map(function(r){return parseFloat(r.v)||0;});
  var mx=Math.max.apply(null,[1].concat(vals));
  var tb=h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'13px'}});
  var tbody=h('tbody');
  rows.forEach(function(r){
    var w=Math.round((parseFloat(r.v)||0)/mx*100);
    var bar=div({background:'#f3f4f6',borderRadius:'4px',overflow:'hidden',minWidth:'80px'},[
      div({height:'8px',borderRadius:'4px',background:'#2563eb',width:w+'%',minWidth:'2px'},[])
    ]);
    tbody.appendChild(h('tr',{style:{borderBottom:'1px solid #f3f4f6'}},[
      h('td',{style:{padding:'7px 8px',color:'#6b7280',whiteSpace:'nowrap'}},[r.name]),
      h('td',{style:{padding:'7px 8px',textAlign:'right',fontWeight:'700',color:'#111827'}},[String(r.v)]),
      h('td',{style:{padding:'7px 8px',minWidth:'90px'}},[bar])
    ]));
  });
  tb.appendChild(tbody);
  return tb;
}
function cpuTbl(data){
  var t=h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'13px'}});
  var thead=h('thead');
  var hr=h('tr');
  ['Date','Avg %','Max %','Trend'].forEach(function(lbl){
    hr.appendChild(h('th',{style:{textAlign:'left',padding:'6px 8px',borderBottom:'2px solid #e5e7eb',color:'#6b7280',fontWeight:'600'}},[lbl]));
  });

    var dkGrid=div({display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:'8px'});
    allDisks.forEach(function(d,i){
      var sku=(d.managedDisk&&d.managedDisk.storageAccountType)||'Unmanaged';
      dkGrid.appendChild(div({background:'#f8fafc',borderRadius:'8px',padding:'10px'},[
        div({fontWeight:'700',fontSize:'13px'},[d.name||'(unnamed)']),
        div({color:'#6b7280',fontSize:'12px',marginTop:'2px'},[(d.diskSizeGB?d.diskSizeGB+' GB - ':'')+sku+' - '+(i===0?'OS Disk':'Data LUN '+d.lun)])
      ]));
    });
    dkCard.appendChild(dkGrid);
    g.appendChild(dkCard);
    content.appendChild(g);
  }

  if(S.tab==='network'){
    var g=div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'});
    g.appendChild(card([div({fontWeight:'700',fontSize:'13px',marginBottom:'14px'},['7-Day Network Totals']),barTbl([{name:'Inbound GB',v:m.totIn},{name:'Outbound GB',v:m.totOut}])]));
    var nc=card([div({fontWeight:'700',fontSize:'13px',marginBottom:'12px'},['Network Summary'])]);
    [['Total Inbound',m.totIn+' GB'],['Total Outbound',m.totOut+' GB'],['Ratio In:Out',m.totOut>0?'1:'+r2(m.totOut/Math.max(m.totIn,0.01)):'N/A'],['Est. egress','~$'+r2(m.totOut*0.087)]].forEach(function(x){nc.appendChild(rowItem(x[0],x[1]));});
    nc.appendChild(div({marginTop:'10px',fontSize:'11px',color:'#9ca3af'},['Egress at $0.087/GB West Europe estimate']));
    g.appendChild(nc);
    content.appendChild(g);
  }

  if(S.tab==='recommendations'){
    var list=div({display:'flex',flexDirection:'column',gap:'13px'});
    rep.recs.forEach(function(r){
      var s=SEV[r.sev];
      var inner=div({flex:'1'},[
        div({display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap',marginBottom:'5px'},[
          h('span',{style:{fontWeight:'800',fontSize:'14px',color:'#111827'}},[r.title]),
          h('span',{style:{background:'#f3f4f6',color:'#374151',fontSize:'11px',fontWeight:'600',padding:'2px 7px',borderRadius:'99px'}},[r.cat])
        ]),
        h('p',{style:{margin:'0 0 7px',fontSize:'13px',color:'#4b5563',lineHeight:'1.5'}},[r.detail]),
        div({fontSize:'13px',color:'#374151'},[h('strong',{},['Action: ']),r.action]),
        r.savings?div({marginTop:'5px',fontSize:'13px',color:'#059669',fontWeight:'700'},['Savings: '+r.savings]):null
      ].filter(Boolean));
      list.appendChild(div({background:s.bg,borderRadius:'12px',border:'1px solid '+s.bd,padding:'18px',borderLeft:'5px solid '+s.tx},[
        div({display:'flex',gap:'13px',alignItems:'flex-start'},[
          h('span',{style:{background:s.tx,color:'white',fontSize:'10px',fontWeight:'800',padding:'3px 8px',borderRadius:'99px',whiteSpace:'nowrap',marginTop:'2px'}},[s.lb]),
          inner
        ])
      ]));
    });
    content.appendChild(list);
  }

  if(S.tab==='details'){
    var g=div({display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'});
    var vc=card([div({fontWeight:'700',fontSize:'13px',marginBottom:'14px'},['VM Configuration'])]);
    var imgRef=vd&&vd.properties&&vd.properties.storageProfile&&vd.properties.storageProfile.imageReference;
    var osDiskSku=osDisk&&osDisk.managedDisk&&osDisk.managedDisk.storageAccountType;
    [['Name',vd&&vd.name],['Resource Group',S.selRG],['Location',vd&&vd.location],
     ['VM Size',m.vmSize],['vCPU / RAM',m.si.v+' vCPU / '+m.si.r+' GB'],['OS',os],
     ['OS Disk SKU',osDiskSku||'--'],['Image',(imgRef&&imgRef.offer)||'Custom'],
     ['Power State',pw],['Provisioning',vd&&vd.properties&&vd.properties.provisioningState],
     ['Est. Cost','~$'+rep.monthlyCost+'/mo']
    ].forEach(function(x){vc.appendChild(rowItem(x[0],String(x[1]||'--')));});
    g.appendChild(vc);
    var right=div({display:'flex',flexDirection:'column',gap:'16px'});
    var tc=card([div({fontWeight:'700',fontSize:'13px',marginBottom:'12px'},['Tags'])]);
    if(!Object.keys(tags).length){tc.appendChild(div({color:'#9ca3af',fontSize:'13px'},['No tags found.']));}
    else{Object.keys(tags).forEach(function(k){tc.appendChild(rowItem(k,tags[k]));});}
    var dc=card([div({fontWeight:'700',fontSize:'13px',marginBottom:'12px'},['Attached Disks'])]);
    allDisks.forEach(function(d,i){
      var sku=(d.managedDisk&&d.managedDisk.storageAccountType)||'Unmanaged';
      dc.appendChild(div({background:'#f8fafc',borderRadius:'8px',padding:'10px',marginBottom:'8px'},[
        div({fontWeight:'700',fontSize:'13px'},[d.name||'(unnamed)']),
        div({color:'#6b7280',fontSize:'12px',marginTop:'2px'},[(d.diskSizeGB?d.diskSizeGB+' GB':'?')+' - '+sku+' - '+(i===0?'OS Disk':'Data LUN '+d.lun)])
      ]));
    });
    right.appendChild(tc);right.appendChild(dc);
    g.appendChild(right);
    content.appendChild(g);
  }

  body.appendChild(content);
  wrap.appendChild(hdr);wrap.appendChild(body);
  return wrap;
}

// ── README ────────────────────────────────────────────────────
var SHOW_README = false;

function drawReadme() {
  var wrap = div({minHeight:'100vh',background:'#f8fafc'});

  // header
  var hdr = div({background:'white',borderBottom:'1px solid #e5e7eb',padding:'12px 24px',display:'flex',alignItems:'center',gap:'12px'});
  hdr.appendChild(div({fontWeight:'800',fontSize:'15px',color:'#111827'},['☁ Azure VM Optimizer']));
  var closeBtn = btn('Close README', function(){SHOW_README=false;draw();},{variant:'secondary',sm:true});
  closeBtn.style.marginLeft='auto';
  hdr.appendChild(closeBtn);

  var body = div({maxWidth:'860px',margin:'0 auto',padding:'24px'});

  function section(title, kids) {
    var s = div({marginBottom:'28px'});
    s.appendChild(h('h2',{style:{fontSize:'16px',fontWeight:'800',color:'#1e40af',marginBottom:'12px',paddingBottom:'6px',borderBottom:'2px solid #dbeafe'}},[title]));
    kids.forEach(function(k){s.appendChild(k);});
    return s;
  }
  function para(text) { return h('p',{style:{fontSize:'13px',color:'#374151',lineHeight:'1.8',marginBottom:'10px'}},[text]); }
  function subhead(text) { return h('h3',{style:{fontSize:'13px',fontWeight:'700',color:'#111827',marginBottom:'6px',marginTop:'12px'}},[text]); }
  function bullet(items) {
    var ul = h('ul',{style:{paddingLeft:'20px',fontSize:'13px',color:'#374151',lineHeight:'1.8',marginBottom:'10px'}});
    items.forEach(function(i){ul.appendChild(h('li',{},[i]));});
    return ul;
  }
  function tableEl(headers, rows) {
    var t = h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'13px',marginBottom:'16px'}});
    var thead = h('thead');
    var hr = h('tr');
    headers.forEach(function(hd){
      hr.appendChild(h('th',{style:{textAlign:'left',padding:'8px 12px',background:'#eff6ff',borderBottom:'2px solid #bfdbfe',fontWeight:'700',color:'#1e40af'}},[hd]));
    });
    thead.appendChild(hr);t.appendChild(thead);
    var tbody = h('tbody');
    rows.forEach(function(row,ri){
      var tr = h('tr',{style:{background:ri%2===0?'white':'#f8fafc'}});
      row.forEach(function(cell){tr.appendChild(h('td',{style:{padding:'8px 12px',borderBottom:'1px solid #e5e7eb',color:'#374151'}},[cell]));});
      tbody.appendChild(tr);
    });
    t.appendChild(tbody);
    return t;
  }
  function codeBlock(text) {
    var pre = h('pre',{style:{background:'#1e293b',color:'#e2e8f0',padding:'12px 16px',borderRadius:'8px',fontSize:'12px',fontFamily:'monospace',overflowX:'auto',marginBottom:'12px',lineHeight:'1.6'}});
    pre.appendChild(document.createTextNode(text));
    return pre;
  }
  function infoBox2(text) {
    return div({background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:'8px',padding:'12px 14px',fontSize:'12px',color:'#0369a1',lineHeight:'1.7',marginBottom:'12px'},[text]);
  }
  function warnBox(text) {
    return div({background:'#fffbeb',border:'1px solid #fcd34d',borderRadius:'8px',padding:'12px 14px',fontSize:'12px',color:'#92400e',lineHeight:'1.7',marginBottom:'12px'},[text]);
  }

  var c = card([
    h('h1',{style:{fontSize:'22px',fontWeight:'900',color:'#111827',marginBottom:'4px'}},['☁ Azure VM Optimizer']),
    h('p',{style:{fontSize:'13px',color:'#6b7280',marginBottom:'24px',paddingBottom:'16px',borderBottom:'1px solid #e5e7eb'}},['Technical Documentation - How Calculations and Recommendations Work']),

    // ── SECTION 1: PURPOSE ──
    section('1. Purpose and Overview', [
      para('The Azure VM Optimizer connects to your Azure environment using your own identity and collects 7 days of performance metrics for a selected Virtual Machine. It then runs those metrics through a scoring and recommendation engine to produce an Optimization Score and a prioritized list of actionable recommendations covering cost, performance, right-sizing, storage, and governance.'),
      para('All processing happens entirely in your browser. No data is sent to any third party. Credentials and tokens are held only in browser memory and are lost when the page is closed or refreshed.')
    ]),

    // ── SECTION 2: METRICS ──
    section('2. Metrics Collected', [
      para('All metrics are pulled from the Azure Monitor Metrics API over a 7-day window at 1-hour intervals. The tool tries multiple metric name variants automatically because different VM series (e.g. Standard_D vs Standard_Dads_v5) expose metrics under slightly different names.'),
      subhead('CPU Utilization'),
      bullet([
        'Metric: Percentage CPU',
        'Aggregations collected: Average, Maximum, Minimum per hour',
        'Derived values: 7-day average, 7-day maximum, 7-day minimum, 95th percentile (p95)',
        'p95 is calculated by sorting all hourly average values and taking the value at the 95th position - this represents the CPU level the VM is at or below 95% of the time and is a better signal for right-sizing than the peak alone'
      ]),
      subhead('Memory Utilization'),
      bullet([
        'Metric: Available Memory Bytes',
        'Memory used % = ((Total RAM bytes - Available bytes) / Total RAM bytes) x 100',
        'Total RAM is taken from the VM size catalog (e.g. Standard_D8ads_v5 = 32 GB)',
        'Important: This metric is only available natively on Windows VMs. Linux VMs require the Azure Monitor Agent with a Data Collection Rule (DCR) configured - without it the memory card shows N/A'
      ]),
      subhead('Disk I/O'),
      bullet([
        'OS Disk Read/Write Bytes per second (throughput in MB/s)',
        'OS Disk Read/Write Operations per second (IOPS)',
        'Data Disk Read/Write Bytes per second',
        'Data Disk Read/Write Operations per second',
        'Both average and peak (maximum) IOPS are captured to detect spiky workloads'
      ]),
      subhead('Network'),
      bullet([
        'Network In Total / Network In: total bytes received over 7 days',
        'Network Out Total / Network Out: total bytes sent over 7 days',
        'Converted from bytes to GB for display',
        'Egress cost estimated at $0.087 per GB (West Europe PAYG rate - actual rate varies by region)'
      ])
    ]),

    // ── SECTION 3: SCORING ──
    section('3. Optimization Score Calculation', [
      para('Every VM starts with a score of 100. Points are deducted based on detected issues. The final score is capped between 0 and 100.'),
      tableEl(
        ['Condition','Points Deducted','Severity'],
        [
          ['CPU average below 5% over 7 days','-35','Critical'],
          ['CPU average below 20% AND peak below 60%','-20','High'],
          ['CPU average above 85% OR peak above 95%','-25','Critical'],
          ['CPU average between 70% and 85%','-10','Medium'],
          ['Memory usage above 85%','-20','Critical'],
          ['Memory usage below 20%','-10','Medium'],
          ['OS disk peak IOPS above 5,000','-10','Medium'],
          ['OS disk I/O negligible (under 1 IOPS and 0.1 MB/s)','-5','Low'],
          ['One or more standard tags missing','-5','Low']
        ]
      ),
      para('Score interpretation:'),
      bullet([
        '80 to 100 = Well Optimized (green) - VM is sized and configured appropriately',
        '60 to 79 = Needs Attention (amber) - some improvements recommended',
        '0 to 59 = Needs Work (red) - significant cost or performance issues detected'
      ])
    ]),

    // ── SECTION 4: RIGHT-SIZING ──
    section('4. Right-Sizing Logic', [
      para('The right-sizing engine calculates a target vCPU count and target RAM size based on observed utilization, then searches the VM catalog for the smallest SKU that satisfies both targets.'),
      subhead('Target vCPU calculation'),
      bullet([
        'If avg CPU is below 10%: target vCPU = floor(current vCPU / 2), minimum 1',
        'If avg CPU is above 80%: target vCPU = current vCPU x 2',
        'Otherwise: target vCPU = current vCPU (no change needed)'
      ]),
      subhead('Target RAM calculation'),
      bullet([
        'If memory usage is below 20%: target RAM = floor(current RAM / 2), minimum 1 GB',
        'If memory usage is above 85%: target RAM = current RAM x 2',
        'Otherwise: target RAM = current RAM (no change needed)',
        'If memory data is unavailable (Linux without AMA): RAM target is unchanged'
      ]),
      subhead('SKU selection'),
      para('The engine scans all SKUs in the catalog and finds the one with the smallest excess capacity above the target - calculated as (vCPU delta x 2) + RAM delta. This prioritizes reducing vCPU over RAM since vCPU has a larger cost impact per unit.'),
      subhead('Savings calculation'),
      para('Monthly cost is estimated at hourly rate x 730 hours. Savings percentage and monthly dollar saving are calculated as the difference between the current SKU cost and the recommended SKU cost at PAYG rates. These are estimates - actual savings depend on your region, reservation status, and Azure Hybrid Benefit.'),
      infoBox2('Right-sizing is only recommended when the new SKU costs less than the current one. Upsizing recommendations (when performance is constrained) are shown as performance warnings only.')
    ]),

    // ── SECTION 5: RECOMMENDATIONS ──
    section('5. Recommendation Categories and Logic', [
      tableEl(
        ['Category','Trigger','Recommended Action'],
        [
          ['Cost / Right-Sizing','CPU avg below 5%','Deallocate or downsize immediately'],
          ['Cost / Right-Sizing','CPU avg below 20% and peak below 60%','Halve the vCPU allocation'],
          ['Performance','CPU avg above 85% or peak above 95%','Scale up or enable Autoscale'],
          ['Performance','CPU avg above 70%','Monitor and plan scale-up'],
          ['Memory','Memory above 85%','Move to memory-optimized E-series SKU'],
          ['Memory','Memory below 20%','Move to smaller RAM SKU'],
          ['Storage','OS disk negligible I/O','Downgrade from Premium SSD to Standard SSD'],
          ['Storage','OS disk peak IOPS above 5,000','Ensure Premium SSD or Ultra Disk'],
          ['Storage','Data disk IOPS below 5 but has throughput','Move cold data to Standard HDD or SSD'],
          ['Right-Sizing','Calculated target SKU is cheaper','Resize to recommended SKU'],
          ['Cost','Always shown','Consider Reserved Instances (1 or 3 year)'],
          ['Governance','Any non-prod VM','Enable auto-shutdown schedule'],
          ['Governance','Missing Environment/Owner/CostCenter/Application tags','Add standard resource tags'],
          ['Tooling','Always shown','Enable Azure Advisor for continuous monitoring']
        ]
      ),
      subhead('Severity levels'),
      bullet([
        'Critical (red): Immediate action required - significant cost waste or performance risk',
        'High (orange): Should be addressed in the current sprint or iteration',
        'Medium (yellow): Address within the next planning cycle',
        'Low (blue): Nice-to-have improvements with minor impact',
        'Info (purple): Best practice suggestions with no score impact'
      ])
    ]),

    // ── SECTION 6: VM CATALOG ──
    section('6. VM Size Catalog and Cost Estimates', [
      para('The tool includes a built-in catalog of common Azure VM sizes with estimated hourly costs at West Europe pay-as-you-go rates. When a VM size is not found in the catalog, a default of 2 vCPU / 8 GB RAM / $0.096/hr is assumed.'),
      bullet([
        'B-series (burstable): B1s, B2ms, B4ms, B8ms',
        'D-series general purpose: D2s_v3 through D16s_v5, D2ads_v5 through D32ads_v5',
        'E-series memory optimized: E2s_v3 through E16s_v3, E2ads_v5 through E16ads_v5',
        'F-series compute optimized: F2s_v2 through F16s_v2'
      ]),
      warnBox('Cost estimates are approximations for planning purposes only. Always verify actual costs in Azure Cost Management before making infrastructure decisions. Costs vary by region, reservation, Azure Hybrid Benefit, and enterprise agreement discounts.')
    ]),

    // ── SECTION 7: AUTH ──
    section('7. Authentication Methods', [
      tableEl(
        ['Method','How It Works','MFA Support','Requirements'],
        [
          ['Sign in with Microsoft (PKCE)','Browser redirects to Microsoft login and back with an auth code. The code is exchanged for a token server-side at Microsoft.','Yes - full MFA','App Registration with SPA redirect URI and user_impersonation permission'],
          ['Paste Bearer Token','Token obtained via Azure CLI (az login handles MFA) and pasted manually.','Yes - MFA done in CLI','Azure CLI installed locally'],
          ['Managed Identity','Token fetched from Azure IMDS endpoint automatically.','N/A - no login needed','Must run on Azure compute with MI assigned and Reader + Monitoring Reader roles']
        ]
      ),
      para('The tool requires Reader role on the subscription to list resources and Monitoring Reader role to access Azure Monitor metrics. No write permissions are needed or requested.')
    ]),

    // ── SECTION 8: LIMITATIONS ──
    section('8. Known Limitations', [
      bullet([
        'Memory metrics are unavailable for Linux VMs unless the Azure Monitor Agent is installed and a Data Collection Rule is configured',
        'Metric names differ between VM series - the tool tries multiple naming conventions automatically but some newer VM series may not return all metrics',
        'Cost estimates use West Europe PAYG rates and do not account for reservations, hybrid benefit, spot pricing, or enterprise agreements',
        'The 7-day analysis window may not capture seasonal or monthly usage patterns - consider running the analysis during representative workload periods',
        'Right-sizing recommendations do not account for memory-mapped files, page file usage, or application-level memory requirements on Windows VMs',
        'Bearer tokens expire after approximately 1 hour - re-run az account get-access-token to refresh',
        'The VM size catalog covers the most common SKUs - less common sizes fall back to default estimates'
      ])
    ])

  ],{padding:'32px'});

  body.appendChild(c);
  wrap.appendChild(hdr);wrap.appendChild(body);
  return wrap;
}

handleCB();draw();

// expose token paste for fallback
window._pasteToken = function(tok) {
  if(!tok||!tok.trim()){alert('Please enter a token');return;}
  S.token = tok.trim();
  azGet(mgmt('/subscriptions?api-version=2022-12-01')).then(function(s){
    set({subs:s.value||[],phase:'browse',busy:false,err:null});
  }).catch(function(e){set({err:e.message,busy:false});});
};
