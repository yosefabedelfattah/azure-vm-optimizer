<html lang="en">
<head>

<style>

.method-card:hover{border-color:#2563eb;background:#eff6ff}
a{color:#2563eb}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const MGMT     = 'https://management.azure.com';
const TENANT_U = tid => `https://login.microsoftonline.com/${tid}`;
const SCOPE    = 'https://management.azure.com/.default offline_access';

  'Standard_E16ads_v5':{vcpu:16,ram:128, tier:'memory',    cost:1.008},
  'Standard_F2s_v2':  {vcpu:2,  ram:4,   tier:'compute',   cost:0.085},
  'Standard_F4s_v2':  {vcpu:4,  ram:8,   tier:'compute',   cost:0.170},

  'Standard_F16s_v2': {vcpu:16, ram:32,  tier:'compute',   cost:0.676},

const SEV = {
  critical:{bg:'#fef2f2',border:'#fca5a5',text:'#dc2626',label:'CRITICAL'},
  high:    {bg:'#fff7ed',border:'#fdba74',text:'#ea580c',label:'HIGH'},
  medium:  {bg:'#fffbeb',border:'#fcd34d',text:'#d97706',label:'MEDIUM'},
  low:     {bg:'#eff6ff',border:'#93c5fd',text:'#2563eb',label:'LOW'},
  info:    {bg:'#f5f3ff',border:'#c4b5fd',text:'#7c3aed',label:'INFO'},
};

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const avg  = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : 0;
const sum  = a => a.reduce((x,y)=>x+y,0);
const r2   = v => Math.round(v*100)/100;
const r1   = v => Math.round(v*10)/10;
const perc = (a,p) => { if(!a.length)return 0; const s=[...a].sort((x,y)=>x-y); return s[Math.floor(p/100*s.length)]||0; };
const $    = id => document.getElementById(id);
const scoreColor = s => s>=80?'#16a34a':s>=60?'#d97706':'#dc2626';
const scoreBg    = s => s>=80?'#f0fdf4':s>=60?'#fffbeb':'#fef2f2';

// ─── DOM factory ─────────────────────────────────────────────
const el = (tag, props={}, children=[]) => {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if      (k==='style'&&typeof v==='object') Object.assign(e.style, v);
    else if (k==='className') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  const kids = Array.isArray(children) ? children : [children];
  kids.forEach(c => { if(c!=null) e.appendChild(typeof c==='string'?document.createTextNode(c):c); });
  return e;
};

const card = (children=[], style={}) =>
  el('div',{style:{background:'white',borderRadius:'12px',border:'1px solid #e5e7eb',
    boxShadow:'0 1px 3px rgba(0,0,0,.06)',padding:'20px',...style}}, children);

const mkBtn = (label, onClick, opts={}) => {
  const {variant='primary',disabled=false,sm=false,full=false} = opts;
  const themes = {
    primary:  {background:'#2563eb',color:'white',border:'none'},
    secondary:{background:'white',color:'#374151',border:'1px solid #d1d5db'},
    ghost:    {background:'transparent',color:'#6b7280',border:'none'},
  };
  const b = el('button',{style:{...themes[variant],borderRadius:'8px',
    cursor:disabled?'not-allowed':'pointer',fontWeight:'600',
    fontSize:sm?'12px':'14px',padding:sm?'7px 14px':'11px 22px',
    opacity:disabled?.55:1,transition:'all .15s',width:full?'100%':'auto'}}, [label]);
  if (!disabled && onClick) b.addEventListener('click', onClick);
  return b;
};

const errBox = msg => msg
  ? el('div',{style:{background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:'8px',
      padding:'10px 14px',marginBottom:'14px',fontSize:'13px',color:'#dc2626'}}, ['⚠️ '+msg])
  : null;

const infoBox = txt =>
  el('div',{style:{background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:'8px',
    padding:'10px 13px',marginBottom:'16px',fontSize:'12px',color:'#0369a1'}}, [txt]);

const statCard = (label, value, unit='', sub='', color='#1d4ed8', warn=false) =>
  el('div',{style:{background:'white',borderRadius:'12px',
    border:`1.5px solid ${warn?'#fca5a5':'#e5e7eb'}`,padding:'16px 18px',textAlign:'center'}},
  [ el('div',{style:{fontSize:'11px',color:'#6b7280',fontWeight:'700',textTransform:'uppercase',
      letterSpacing:'0.06em',marginBottom:'6px'}},[label]),
    el('div',{style:{fontSize:'26px',fontWeight:'900',color,lineHeight:'1'}},
      [String(value), el('span',{style:{fontSize:'13px',fontWeight:'500',color:'#6b7280'}},unit?[unit]:[])]),
    sub ? el('div',{style:{fontSize:'11px',color:'#9ca3af',marginTop:'4px'}},[sub]) : null
  ].filter(Boolean));

const rowEl = (k,v) =>
  el('div',{style:{display:'flex',justifyContent:'space-between',padding:'8px 0',
    borderBottom:'1px solid #f3f4f6',fontSize:'13px'}},
  [el('span',{style:{color:'#6b7280'}},[k]),
   el('span',{style:{fontWeight:'600',color:'#111827',maxWidth:'250px',textAlign:'right',wordBreak:'break-all'}},[String(v||'—')])]);

// ─── Chart helpers (no external libs) ────────────────────────
const cpuTable = data => {
  const t = el('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'13px'}});
  t.append(el('thead',{},[el('tr',{},[
    el('th',{style:{textAlign:'left', padding:'6px 8px',borderBottom:'2px solid #e5e7eb',color:'#6b7280',fontWeight:'600'}},['Date']),
    el('th',{style:{textAlign:'right',padding:'6px 8px',borderBottom:'2px solid #e5e7eb',color:'#6b7280',fontWeight:'600'}},['Avg %']),
    el('th',{style:{textAlign:'right',padding:'6px 8px',borderBottom:'2px solid #e5e7eb',color:'#6b7280',fontWeight:'600'}},['Max %']),
    el('th',{style:{padding:'6px 8px',borderBottom:'2px solid #e5e7eb'}},['Trend']),
  ])]));
  const tb = el('tbody');
  if (!data.length) tb.append(el('tr',{},[el('td',{colspan:'4',style:{padding:'12px 8px',color:'#9ca3af',textAlign:'center'}},['No CPU data available'])]));
  data.forEach(d => {
    const color = d.avgCPU>80?'#dc2626':d.avgCPU>50?'#f59e0b':'#2563eb';
    const bar = el('div',{style:{background:'#f3f4f6',borderRadius:'4px',overflow:'hidden',minWidth:'100px'}},
      [el('div',{style:{height:'8px',borderRadius:'4px',background:color,width:Math.round(d.avgCPU)+'%',minWidth:'2px'}})]);
    tb.append(el('tr',{style:{borderBottom:'1px solid #f3f4f6'}},
      [el('td',{style:{padding:'7px 8px',fontWeight:'600',color:'#374151'}},[d.date]),
       el('td',{style:{padding:'7px 8px',textAlign:'right',color,fontWeight:'700'}},[d.avgCPU+'%']),
       el('td',{style:{padding:'7px 8px',textAlign:'right',color:'#9ca3af'}},[d.maxCPU+'%']),
       el('td',{style:{padding:'7px 8px'}},[bar])]));
  });
  t.append(tb);
  return t;
};

const barTable = rows => {
  const maxV = Math.max(...rows.map(r=>parseFloat(r.v)||0), 1);
  const t = el('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'13px'}});
  const tb = el('tbody');
  rows.forEach(r => {
    const v = parseFloat(r.v)||0;
    const bar = el('div',{style:{background:'#f3f4f6',borderRadius:'4px',overflow:'hidden',minWidth:'80px'}},
      [el('div',{style:{height:'8px',borderRadius:'4px',background:'#2563eb',width:Math.round(v/maxV*100)+'%',minWidth:'2px'}})]);
    tb.append(el('tr',{style:{borderBottom:'1px solid #f3f4f6'}},
      [el('td',{style:{padding:'7px 8px',color:'#6b7280'}},[r.name]),
       el('td',{style:{padding:'7px 8px',textAlign:'right',fontWeight:'700',color:'#111827'}},[String(r.v)]),
       el('td',{style:{padding:'7px 8px',minWidth:'100px'}},[bar])]));
  });
  t.append(tb);
  return t;
};

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let S = {
  phase:'connect', authMethod:null,
  token:null, tenantId:'', clientId:'', pastedToken:'',
  deviceCode:null, pollTimer:null,
  subs:[], selSub:null, rgs:[], selRG:null, vms:[], selVM:null,
  vmDetail:null, metrics:null, report:null,
  tab:'overview', busy:false, err:null,
};
const setState = patch => { Object.assign(S, patch); render(); };

// ═══════════════════════════════════════════════════════════
// AZURE API
// ═══════════════════════════════════════════════════════════
const az = async (url, tok) => {
  const r = await fetch(url, {headers:{Authorization:`Bearer ${tok||S.token}`}});
  if (!r.ok) { const t=await r.text(); throw new Error(`Azure ${r.status}: ${t.slice(0,400)}`); }
  return r.json();
};

const loadSubs = async tok => {
  const s = await az(`${MGMT}/subscriptions?api-version=2022-12-01`, tok);
  setState({subs:s.value||[], phase:'browse', busy:false, err:null});
};

// ═══════════════════════════════════════════════════════════
// AUTH — BEARER TOKEN
// ═══════════════════════════════════════════════════════════
const connectWithToken = async () => {
  const tok = S.pastedToken.trim();
  if (!tok) { setState({err:'Please paste a bearer token.'}); return; }
  setState({busy:true, err:null});
  try { S.token=tok; await loadSubs(tok); }
  catch(e) { setState({busy:false, err:e.message}); }
};

// ═══════════════════════════════════════════════════════════
// AUTH — DEVICE CODE
// ═══════════════════════════════════════════════════════════
const startDeviceFlow = async () => {
  if (!S.tenantId||!S.clientId) { setState({err:'Tenant ID and Client ID are required.'}); return; }
  setState({busy:true, err:null});
  try {
    const r = await fetch(`${TENANT_U(S.tenantId)}/oauth2/v2.0/devicecode`,{
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({client_id:S.clientId, scope:SCOPE})
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error_description||data.error);
    const timer = setInterval(()=>pollDevice(data.device_code, timer), (data.interval||5)*1000);
    setState({deviceCode:data, pollTimer:timer, busy:false});
  } catch(e) { setState({busy:false, err:e.message}); }
};

const pollDevice = async (dc, timer) => {
  try {
    const r = await fetch(`${TENANT_U(S.tenantId)}/oauth2/v2.0/token`,{
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({client_id:S.clientId, device_code:dc,
        grant_type:'urn:ietf:params:oauth:grant-type:device_code'})
    });
    const data = await r.json();
    if (data.access_token) {
      clearInterval(timer);
      S.token = data.access_token;
      setState({pollTimer:null, deviceCode:null, busy:true});
      await loadSubs(data.access_token);
    } else if (data.error && data.error!=='authorization_pending' && data.error!=='slow_down') {
      clearInterval(timer);
      setState({pollTimer:null, deviceCode:null, err:data.error_description||data.error});
    }
  } catch(_) {}
};

const cancelDevice = () => {
  if (S.pollTimer) clearInterval(S.pollTimer);
  setState({pollTimer:null, deviceCode:null, err:null});
};

// ═══════════════════════════════════════════════════════════
// AUTH — PKCE
// ═══════════════════════════════════════════════════════════
const genVerifier  = () => { const a=new Uint8Array(32); crypto.getRandomValues(a); return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); };
const genChallenge = async v => { const e=new TextEncoder().encode(v); const h=await crypto.subtle.digest('SHA-256',e); return btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); };

const startPKCE = async () => {
  if (!S.tenantId||!S.clientId) { setState({err:'Tenant ID and Client ID are required.'}); return; }
  const verifier=genVerifier(), challenge=await genChallenge(verifier);
  sessionStorage.setItem('pkce_v',verifier);
  sessionStorage.setItem('pkce_t',S.tenantId);
  sessionStorage.setItem('pkce_c',S.clientId);
  const redirect = location.href.split('?')[0].split('#')[0];
  const params = new URLSearchParams({client_id:S.clientId,response_type:'code',redirect_uri:redirect,
    scope:SCOPE,code_challenge:challenge,code_challenge_method:'S256',response_mode:'query'});
  location.href = `${TENANT_U(S.tenantId)}/oauth2/v2.0/authorize?${params}`;
};

const handlePKCECallback = async () => {
  const p=new URLSearchParams(location.search), code=p.get('code');
  if (!code) return;
  const verifier=sessionStorage.getItem('pkce_v'), tid=sessionStorage.getItem('pkce_t'), cid=sessionStorage.getItem('pkce_c');
  if (!verifier||!tid||!cid) return;
  ['pkce_v','pkce_t','pkce_c'].forEach(k=>sessionStorage.removeItem(k));
  history.replaceState({},'',location.pathname);
  setState({busy:true});
  try {
    const redirect = location.href.split('?')[0].split('#')[0];
    const r = await fetch(`${TENANT_U(tid)}/oauth2/v2.0/token`,{
      method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body: new URLSearchParams({client_id:cid,code,redirect_uri:redirect,grant_type:'authorization_code',code_verifier:verifier})
    });
    const data = await r.json();
    if (data.access_token) { S.token=data.access_token; setState({tenantId:tid,clientId:cid}); await loadSubs(data.access_token); }
    else throw new Error(data.error_description||data.error);
  } catch(e) { setState({busy:false, err:e.message}); }
};

// ═══════════════════════════════════════════════════════════
// BROWSE
// ═══════════════════════════════════════════════════════════
const pickSub = async sub => {
  setState({busy:true,err:null,selSub:sub,rgs:[],vms:[],selRG:null});
  try {
    const r = await az(`${MGMT}/subscriptions/${sub.subscriptionId}/resourcegroups?api-version=2023-07-01`);
    setState({rgs:r.value||[],busy:false});
  } catch(e) { setState({busy:false,err:e.message}); }
};

const pickRG = async rg => {
  setState({busy:true,err:null,selRG:rg,vms:[]});
  try {
    const subId = S.selSub.subscriptionId;
    let found = [];

    // Strategy 1: RG-scoped, multiple API versions
    for (const api of ['2024-03-01','2023-09-01','2023-03-01','2022-11-01']) {
      try {
        const r = await az(`${MGMT}/subscriptions/${subId}/resourceGroups/${encodeURIComponent(rg)}/providers/Microsoft.Compute/virtualMachines?api-version=${api}`);
        found = r.value||[];
        if (found.length>0) break;
      } catch(_) {}
    }

    // Strategy 2: subscription-wide, filter by RG name
    if (found.length===0) {
      try {
        const r = await az(`${MGMT}/subscriptions/${subId}/providers/Microsoft.Compute/virtualMachines?api-version=2023-03-01`);
        found = (r.value||[]).filter(v=>{
          const parts=v.id.split('/'), idx=parts.findIndex(p=>p.toLowerCase()==='resourcegroups');
          return idx>=0 && parts[idx+1]?.toLowerCase()===rg.toLowerCase();
        });
      } catch(_) {}
    }

    if (found.length===0) {
      setState({vms:[],busy:false,err:`No VMs found in "${rg}". Try another resource group or use "Show ALL VMs" button.`});
    } else {
      setState({vms:found,busy:false,err:null});
    }
  } catch(e) { setState({busy:false,err:e.message}); }
};

const showAllVMs = async () => {
  if (!S.selSub) return;
  setState({busy:true,err:null,vms:[],selRG:'(All VMs in subscription)'});
  try {
    const r = await az(`${MGMT}/subscriptions/${S.selSub.subscriptionId}/providers/Microsoft.Compute/virtualMachines?api-version=2023-03-01`);
    const found = r.value||[];
    setState({vms:found,busy:false,err:found.length===0?'No VMs found in this subscription.':null});
  } catch(e) { setState({busy:false,err:e.message}); }
};

// ═══════════════════════════════════════════════════════════
// ANALYZE
// ═══════════════════════════════════════════════════════════
const analyzeVM = async vm => {
  setState({busy:true,err:null,selVM:vm,report:null,metrics:null});
  try {
    const detail = await az(`${MGMT}${vm.id}?api-version=2023-07-01&$expand=instanceView`);
    const end=new Date().toISOString(), start=new Date(Date.now()-7*24*3600*1000).toISOString();
    const ts=`${start}/${end}`;

    // Fetch metrics in flexible batches — handles both old and new naming conventions
    const batches = [
      ['Percentage CPU'],
      ['Network In Total','Network Out Total'],  // newer VMs
      ['Network In','Network Out'],               // older VMs (Dads_v5 etc.)
      ['Disk Read Bytes/sec','Disk Write Bytes/sec'],  // newer
      ['Disk Read Bytes','Disk Write Bytes'],           // older (Dads_v5, etc.)
      ['Disk Read Operations/Sec','Disk Write Operations/Sec'],
      ['OS Disk Read Bytes/sec','OS Disk Write Bytes/sec'],
      ['OS Disk Read Operations/Sec','OS Disk Write Operations/Sec'],
      ['Data Disk Read Bytes/sec','Data Disk Write Bytes/sec'],
      ['Data Disk Read Operations/Sec','Data Disk Write Operations/Sec'],
    ];

    const allMetrics=[], seen=new Set();
    for (const batch of batches) {
      const key = batch[0].toLowerCase().replace(/\s|\/sec|total|bytes/g,'');
      if (seen.has(key)) continue;
      try {
        const r = await az(
          `${MGMT}${vm.id}/providers/Microsoft.Insights/metrics?api-version=2023-10-01` +
          `&timespan=${ts}&interval=PT1H` +
          `&metricnames=${encodeURIComponent(batch.join(','))}` +
          `&aggregation=Average,Maximum,Minimum`
        );
        const valid = (r.value||[]).filter(m=>m.timeseries?.[0]?.data?.some(d=>d.average!=null));
        if (valid.length>0) { allMetrics.push(...valid); seen.add(key); }
      } catch(_) {} // skip failed batches silently
    }

    // Memory — Windows only, may fail on Linux (expected)
    let memMetric=null;
    try {
      const m = await az(
        `${MGMT}${vm.id}/providers/Microsoft.Insights/metrics?api-version=2023-10-01` +
        `&timespan=${ts}&interval=PT1H` +
        `&metricnames=Available%20Memory%20Bytes&aggregation=Average`
      );
      memMetric = m.value?.[0];
    } catch(_) {}

    const processed = processMetrics(allMetrics, memMetric, detail);
    setState({vmDetail:detail,metrics:processed,report:buildReport(processed,detail),phase:'analyze',tab:'overview',busy:false,err:null});
  } catch(e) { setState({busy:false,err:e.message}); }
};

// ═══════════════════════════════════════════════════════════
// METRICS PROCESSING
// ═══════════════════════════════════════════════════════════
const processMetrics = (vals, memMetric, detail) => {
  // Flexible lookup — tries multiple name variants, returns first match
  const gm = (...names) => {
    for (const n of names) {
      const f = vals.find(m=>m.name.value===n||m.name.localizedValue===n);
      if (f) return f;
    }
    return null;
  };
  const pts  = m => m?.timeseries?.[0]?.data||[];
  const avgs = m => pts(m).map(d=>d.average).filter(v=>v!=null);
  const maxs = m => pts(m).map(d=>d.maximum||d.average||0);

  const cpu     = gm('Percentage CPU');
  const cpuAvgs = avgs(cpu);
  const cpuMaxs = maxs(cpu);
  const cpuAvg  = r1(avg(cpuAvgs));
  const cpuMax  = r1(cpuMaxs.length ? Math.max(0,...cpuMaxs) : 0);
  const cpuMin  = r1(cpuAvgs.filter(v=>v>0).length ? Math.min(...cpuAvgs.filter(v=>v>0)) : 0);
  const cpuP95  = r1(perc(cpuAvgs,95));

  const vmSize = detail.properties?.hardwareProfile?.vmSize;
  const si     = VM_CATALOG[vmSize]||{vcpu:2,ram:8,tier:'general',cost:0.096};

  // Memory (Windows only)
  let memPct=null;
  if (memMetric) {
    const a = avg(avgs(memMetric));
    if (a>0) memPct = r1(((si.ram*1073741824-a)/(si.ram*1073741824))*100);
  }

  // Disk — try both naming conventions
  const diskR  = gm('Disk Read Bytes/sec',  'Disk Read Bytes',  'OS Disk Read Bytes/sec');
  const diskW  = gm('Disk Write Bytes/sec', 'Disk Write Bytes', 'OS Disk Write Bytes/sec');
  const diskRO = gm('Disk Read Operations/Sec',  'OS Disk Read Operations/Sec');
  const diskWO = gm('Disk Write Operations/Sec', 'OS Disk Write Operations/Sec');
  const ddR    = gm('Data Disk Read Bytes/sec',  'Data Disk Read Bytes');
  const ddW    = gm('Data Disk Write Bytes/sec', 'Data Disk Write Bytes');
  const ddRO   = gm('Data Disk Read Operations/Sec');
  const ddWO   = gm('Data Disk Write Operations/Sec');
  const netIn  = gm('Network In Total',  'Network In');
  const netOut = gm('Network Out Total', 'Network Out');

  const MB = 1048576;
  const mk = (m,div=1) => { const a=avgs(m); return r2(a.length ? avg(a)/div : 0); };
  const mx = (m,div=1) => { const a=avgs(m); return r2(a.length ? Math.max(0,...a)/div : 0); };

  // Daily CPU for chart
  const dailyMap={};
  pts(cpu).forEach(d=>{
    if (d.average==null) return;
    const day=d.timeStamp.slice(0,10);
    if (!dailyMap[day]) dailyMap[day]={cpus:[]};
    dailyMap[day].cpus.push(d.average);
  });
  const chartData = Object.entries(dailyMap).map(([day,v])=>({
    date:day.slice(5), avgCPU:r1(avg(v.cpus)), maxCPU:r1(Math.max(...v.cpus))
  }));

  return {
    vmSize,si,cpuAvg,cpuMax,cpuMin,cpuP95,memPct,
    avgDiskR:mk(diskR,MB), avgDiskW:mk(diskW,MB),
    avgROps:Math.round(mk(diskRO)), avgWOps:Math.round(mk(diskWO)),
    maxROps:Math.round(mx(diskRO)), maxWOps:Math.round(mx(diskWO)),
    avgDdR:mk(ddR,MB),  avgDdW:mk(ddW,MB),
    avgDdROps:Math.round(mk(ddRO)), avgDdWOps:Math.round(mk(ddWO)),
    totIn:r2(sum(avgs(netIn))/1073741824),
    totOut:r2(sum(avgs(netOut))/1073741824),
    chartData,
  };
};

// ═══════════════════════════════════════════════════════════
// RECOMMENDATIONS ENGINE
// ═══════════════════════════════════════════════════════════
const buildReport = (m, detail) => {
  const recs=[]; let score=100;

  // CPU
  if      (m.cpuAvg<5)               { score-=35; recs.push({sev:'critical',cat:'Cost/Right-Sizing',icon:'🔴',title:'Severely underutilized CPU',      detail:`Avg CPU only ${m.cpuAvg}% over 7 days. VM is essentially idle.`,              action:'Downsize or deallocate if workload is inactive.',          savings:'Up to 70–80% cost reduction'}); }
  else if (m.cpuAvg<20&&m.cpuMax<60) { score-=20; recs.push({sev:'high',   cat:'Cost/Right-Sizing',icon:'🟠',title:'CPU over-provisioned',              detail:`Avg: ${m.cpuAvg}%, peak: ${m.cpuMax}%. Sustained low utilization.`,         action:'Consider halving vCPU count.',                             savings:'30–50% cost reduction'}); }
  else if (m.cpuAvg>85||m.cpuMax>95) { score-=25; recs.push({sev:'critical',cat:'Performance',     icon:'🔴',title:'CPU saturation detected',           detail:`Avg: ${m.cpuAvg}%, peak: ${m.cpuMax}%, p95: ${m.cpuP95}%.`,                action:'Scale up or enable Azure Autoscale.',                      savings:'N/A — performance required'}); }
  else if (m.cpuAvg>70)              { score-=10; recs.push({sev:'medium', cat:'Performance',     icon:'🟡',title:'Elevated CPU utilization',           detail:`Avg ${m.cpuAvg}% — approaching saturation.`,                               action:'Plan scale-up or review sizing.',                          savings:'Preventive action'}); }

  // Memory
  if (m.memPct!==null) {
    if      (m.memPct>85) { score-=20; recs.push({sev:'critical',cat:'Memory',icon:'🔴',title:'High memory pressure',    detail:`Memory usage ${m.memPct}%. Risk of OOM events.`,  action:'Upgrade to memory-optimized E-series SKU.', savings:'N/A — upgrade required'}); }
    else if (m.memPct<20) { score-=10; recs.push({sev:'medium', cat:'Memory',icon:'🟡',title:'Low memory utilization',   detail:`Only ${m.memPct}% memory used.`,                   action:'Move to burstable or compute SKU with less RAM.', savings:'15–30% cost reduction'}); }
  }

  // Disk
  if (m.avgROps<1&&m.avgWOps<1&&m.avgDiskR<0.1&&m.avgDiskW<0.1) {
    score-=5; recs.push({sev:'low',cat:'Storage',icon:'🔵',title:'Negligible OS disk I/O',detail:`Read: ${m.avgDiskR} MB/s, Write: ${m.avgDiskW} MB/s.`,action:'Downgrade from Premium SSD to Standard SSD.',savings:'$15–30/month on disk tier'});
  } else if (m.maxROps>5000||m.maxWOps>5000) {
    score-=10; recs.push({sev:'medium',cat:'Storage',icon:'🟡',title:'Peak IOPS are high',detail:`Peak Read: ${m.maxROps}, Write: ${m.maxWOps} IOPS.`,action:'Ensure Premium SSD or Ultra Disk is configured.',savings:'Performance improvement'});
  }
  if (m.avgDdROps<5&&m.avgDdWOps<5&&(m.avgDdR>0||m.avgDdW>0)) {
    recs.push({sev:'low',cat:'Storage',icon:'🔵',title:'Data disk low IOPS',detail:`Read: ${m.avgDdROps} IOPS, Write: ${m.avgDdWOps} IOPS.`,action:'Move cold data to Standard HDD/SSD.',savings:'Up to 60% disk cost reduction'});
  }

  // Right-sizing
  const rs = rightSize(m);
  if (rs&&rs.size!==m.vmSize) {
    const cur=m.si.cost, nc=VM_CATALOG[rs.size]?.cost||cur;
    if (nc<cur) {
      const sp=Math.round((cur-nc)/cur*100), sm=Math.round((cur-nc)*730);
      recs.push({sev:'high',cat:'Right-Sizing',icon:'🟠',
        title:`Recommended SKU: ${rs.size}`,
        detail:`${m.vmSize} (${m.si.vcpu}vCPU/${m.si.ram}GB) → ${rs.size} (${VM_CATALOG[rs.size].vcpu}vCPU/${VM_CATALOG[rs.size].ram}GB). ${rs.reason}`,
        action:'Resize via Azure Portal → VM → Size, or: az vm resize.',
        savings:`~${sp}% cost reduction (~$${sm}/month)`});
    }
  }

  // Cost & governance
  recs.push({sev:'info',cat:'Cost',          icon:'🟣',title:'Consider Reserved Instances',         detail:`1- or 3-year reservations on ${m.vmSize} unlock major discounts vs pay-as-you-go.`,action:'Purchase via Azure Portal → Reservations.',savings:'Up to 40–72% vs PAYG'});
  recs.push({sev:'info',cat:'Cost Governance',icon:'🟣',title:'Enable auto-shutdown for non-prod VMs',detail:'Scheduling shutdown outside business hours eliminates idle costs.',               action:'Azure Portal → VM → Auto-shutdown.',       savings:'Up to 60% for dev/test workloads'});

  const tags=detail.tags||{}, missing=['Environment','Owner','CostCenter','Application'].filter(t=>!tags[t]);
  if (missing.length) { score-=5; recs.push({sev:'low',cat:'Governance',icon:'🔵',title:`Missing tags: ${missing.join(', ')}`,detail:'Untagged resources make cost attribution and chargeback difficult.',action:'Add standard tags for cost reporting.',savings:'Improved governance'}); }

  recs.push({sev:'info',cat:'Tooling',icon:'🟣',title:'Enable Azure Advisor',detail:'Continuously surfaces right-sizing, security and reliability recommendations.',action:'Navigate to Azure Advisor in the Azure Portal.',savings:'Ongoing optimization'});

  return {score:Math.max(0,Math.round(score)), recs, monthlyCost:r2(m.si.cost*730), rs};
};

const rightSize = m => {
  let tc=m.si.vcpu, tr=m.si.ram;
  if (m.cpuAvg<10) tc=Math.max(1,Math.floor(m.si.vcpu/2)); else if (m.cpuAvg>80) tc=m.si.vcpu*2;
  if (m.memPct!==null) { if(m.memPct<20) tr=Math.max(1,Math.floor(m.si.ram/2)); else if(m.memPct>85) tr=m.si.ram*2; }
  let best=null, bd=Infinity;
  for (const [sz,info] of Object.entries(VM_CATALOG)) {
    if (info.vcpu>=tc&&info.ram>=tr) { const d=(info.vcpu-tc)*2+(info.ram-tr); if(d<bd){bd=d;best=sz;} }
  }
  return best ? {size:best,reason:`Target: ${tc} vCPU / ${tr} GB RAM from 7-day utilization.`} : null;
};

      const aBtn=mkBtn(S.busy?'⏳ Analyzing...':'🔍 Analyze & Optimize',()=>analyzeVM(vm),{sm:true,disabled:S.busy});
      vmGrid.append(el('div',{style:{border:'1.5px solid #e5e7eb',borderRadius:'10px',padding:'16px',background:'white'}},
        [el('div',{style:{fontWeight:'700',fontSize:'14px',color:'#111827',marginBottom:'3px'}},[(vmos==='Windows'?'🪟':'🐧')+' '+vm.name]),
         el('div',{style:{fontSize:'11px',color:'#9ca3af',marginBottom:'6px'}},[vm.location+(vmRG?' · 📁 '+vmRG:'')]),
         el('div',{style:{fontSize:'12px',color:'#374151',marginBottom:'12px'}},
           [el('strong',{},[sz]),info?el('span',{style:{color:'#6b7280'}},[` · ${info.vcpu} vCPU · ${info.ram} GB · ~$${r2(info.cost*730)}/mo`]):null].filter(Boolean)),
         aBtn]));
    });
    body.append(card([
      el('h3',{style:{fontSize:'13px',fontWeight:'700',color:'#374151',marginBottom:'14px'}},
        ['🖥️ Virtual Machines — ',el('span',{style:{color:'#2563eb'}},[S.selRG||''])]),
      vmGrid
    ]));
  } else if (S.selSub&&!S.busy&&!S.err) {
    body.append(card([el('div',{style:{color:'#9ca3af',fontSize:'13px'}},['Select a resource group or click "Show ALL VMs in subscription".'])]));
  }

  wrap.append(hdr,body);
  return wrap;
};

// ═══════════════════════════════════════════════════════════
// ANALYZE SCREEN
// ═══════════════════════════════════════════════════════════
const renderAnalyze = () => {
  const m=S.metrics, rep=S.report, vd=S.vmDetail;
  const tags=vd?.tags||{};
  const os=vd?.properties?.storageProfile?.osDisk?.osType||'Linux';
  const pw=vd?.properties?.instanceView?.statuses?.find(s=>s.code?.startsWith('PowerState/'))?.displayStatus||'Unknown';
  const disks=[vd?.properties?.storageProfile?.osDisk,...(vd?.properties?.storageProfile?.dataDisks||[])].filter(Boolean);
  const TABS=['overview','cpu','disk','network','recommendations','details'];

  const wrap=el('div',{style:{minHeight:'100vh',background:'#f8fafc'}});

  // Header
  const hdr=el('div',{style:{background:'white',borderBottom:'1px solid #e5e7eb',padding:'12px 24px',display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}});
  const pwBadge=el('span',{style:{marginLeft:'auto',background:pw.includes('running')?'#dcfce7':'#fef3c7',
    color:pw.includes('running')?'#15803d':'#92400e',fontSize:'11px',fontWeight:'700',padding:'3px 12px',borderRadius:'99px'}},['⚡ '+pw]);
  hdr.append(
    mkBtn('← Back',()=>setState({phase:'browse'}),{variant:'secondary',sm:true}),
    el('span',{style:{fontSize:'20px'}},['☁️']),
    el('span',{style:{fontWeight:'800',fontSize:'15px',color:'#111827'}},[(os==='Windows'?'🪟':'🐧')+' '+S.selVM?.name]),
    el('span',{style:{color:'#6b7280',fontSize:'12px'}},[m.vmSize+' · '+S.selVM?.location]),
    pwBadge
  );

  const body=el('div',{style:{maxWidth:'1120px',margin:'0 auto',padding:'24px'}});

  // Score banner
  const banner=el('div',{style:{display:'grid',gridTemplateColumns:'180px 1fr',gap:'16px',marginBottom:'20px'}});
  banner.append(
    card([
      el('div',{style:{fontSize:'11px',fontWeight:'700',color:'#6b7280',marginBottom:'8px'}},['OPTIMIZATION SCORE']),
      el('div',{style:{fontSize:'68px',fontWeight:'900',color:scoreColor(rep.score),lineHeight:'1'}},[String(rep.score)]),
      el('div',{style:{fontSize:'12px',color:scoreColor(rep.score),marginTop:'6px',fontWeight:'700'}},
        [rep.score>=80?'✅ Well Optimized':rep.score>=60?'⚠️ Needs Attention':'🔴 Needs Work']),
      el('div',{style:{marginTop:'10px',fontSize:'12px',color:'#374151'}},
        [el('strong',{},[`~$${rep.monthlyCost}/month`]),el('br'),el('span',{style:{color:'#9ca3af'}},['est. pay-as-you-go'])])
    ],{textAlign:'center',background:scoreBg(rep.score)}),
  );
  const chips=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'7px',marginBottom:'8px'}});
  rep.recs.forEach(r=>{ const s=SEV[r.sev]; chips.append(el('span',{style:{background:s.bg,color:s.text,fontSize:'11px',fontWeight:'700',padding:'3px 9px',borderRadius:'99px',border:`1px solid ${s.border}`}},[r.icon+' '+r.title])); });
  const sc2=card([el('div',{style:{fontSize:'13px',fontWeight:'700',color:'#111827',marginBottom:'10px'}},[`💡 ${rep.recs.length} Recommendations · 7-day analysis`]),chips]);
  if (rep.rs&&rep.rs.size!==m.vmSize) sc2.append(el('div',{style:{marginTop:'8px',padding:'9px 12px',background:'#f0fdf4',borderRadius:'8px',fontSize:'12px',color:'#15803d',fontWeight:'600'}},['🎯 Right-size to ',el('strong',{},[rep.rs.size]),' — '+rep.rs.reason]));
  banner.append(sc2);
  body.append(banner);

  // Tab bar
  const tabBar=el('div',{style:{display:'flex',gap:'3px',marginBottom:'20px',background:'white',borderRadius:'10px',padding:'5px',border:'1px solid #e5e7eb',width:'fit-content'}});
  TABS.forEach(t=>{
    const b=el('button',{className:'tab-btn'+(S.tab===t?' active':'')},[t.charAt(0).toUpperCase()+t.slice(1)]);
    b.addEventListener('click',()=>setState({tab:t}));
    tabBar.append(b);
  });
  body.append(tabBar);

  const content=el('div');

  // ── Overview ──
  if (S.tab==='overview') {
    const g1=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px',marginBottom:'12px'}});
    g1.append(
      statCard('Avg CPU',   m.cpuAvg,'%',`Max ${m.cpuMax}% · p95 ${m.cpuP95}%`,m.cpuAvg>80?'#dc2626':m.cpuAvg<10?'#d97706':'#2563eb',m.cpuAvg>85||m.cpuAvg<5),
      statCard('Memory',    m.memPct??'N/A',m.memPct?'%':'',m.memPct?'Avg 7 days':'Linux/unavailable',!m.memPct?'#9ca3af':m.memPct>85?'#dc2626':'#2563eb',m.memPct>85),
      statCard('Disk Read', m.avgDiskR,'MB/s',`${m.avgROps} avg IOPS`,'#7c3aed'),
      statCard('Disk Write',m.avgDiskW,'MB/s',`${m.avgWOps} avg IOPS`,'#7c3aed'),
    );
    const g2=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px',marginBottom:'12px'}});
    g2.append(
      statCard('Data Disk R',m.avgDdR,'MB/s',`${m.avgDdROps} IOPS`,'#0891b2'),
      statCard('Data Disk W',m.avgDdW,'MB/s',`${m.avgDdWOps} IOPS`,'#0891b2'),
      statCard('Net In (7d)',m.totIn,'GB','','#059669'),
      statCard('Net Out (7d)',m.totOut,'GB','','#059669'),
    );
    content.append(g1,g2,card([
      el('div',{style:{fontWeight:'700',fontSize:'13px',color:'#374151',marginBottom:'14px'}},['📈 CPU Utilization — Daily Trend (7 days)']),
      cpuTable(m.chartData)
    ]));
  }

  // ── CPU ──
  else if (S.tab==='cpu') {
    content.append(el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}},
      [card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'14px'}},['📊 CPU Statistics (7-day)']),
         barTable([{name:'Average',v:m.cpuAvg+'%'},{name:'Maximum',v:m.cpuMax+'%'},{name:'p95',v:m.cpuP95+'%'},{name:'Minimum',v:m.cpuMin+'%'}])]),
       card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'14px'}},['📈 Daily Trend']),cpuTable(m.chartData)])]));
  }

  // ── Disk ──
  else if (S.tab==='disk') {
    content.append(el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}},
      [card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'14px'}},['💾 OS Disk Throughput & IOPS']),
         barTable([{name:'Read MB/s',v:m.avgDiskR},{name:'Write MB/s',v:m.avgDiskW},
                   {name:'Read IOPS avg',v:m.avgROps},{name:'Write IOPS avg',v:m.avgWOps},
                   {name:'Read IOPS peak',v:m.maxROps},{name:'Write IOPS peak',v:m.maxWOps}])]),
       card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'14px'}},['📀 Data Disk I/O']),
         barTable([{name:'Read MB/s',v:m.avgDdR},{name:'Write MB/s',v:m.avgDdW},
                   {name:'Read IOPS',v:m.avgDdROps},{name:'Write IOPS',v:m.avgDdWOps}])]),
       card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'12px'}},['🗂️ Attached Disks']),
         ...disks.map((d,i)=>el('div',{style:{background:'#f8fafc',borderRadius:'8px',padding:'10px',marginBottom:'8px'}},
           [el('div',{style:{fontWeight:'700',fontSize:'13px'}},[d.name||'(unnamed)']),
            el('div',{style:{color:'#6b7280',fontSize:'12px',marginTop:'2px'}},
              [(d.diskSizeGB?d.diskSizeGB+' GB · ':'')+
               (d.managedDisk?.storageAccountType||'Unmanaged')+' · '+
               (i===0?'OS Disk':'Data Disk LUN '+d.lun)])]))])]));
  }

  // ── Network ──
  else if (S.tab==='network') {
    content.append(el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}},
      [card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'14px'}},['🌐 7-Day Network Totals']),
         barTable([{name:'Inbound GB',v:m.totIn},{name:'Outbound GB',v:m.totOut}])]),
       card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'12px'}},['📡 Network Summary']),
         ...[['Total Inbound (7d)',m.totIn+' GB'],['Total Outbound (7d)',m.totOut+' GB'],
             ['Ratio In:Out',m.totOut>0?'1 : '+r2(m.totOut/Math.max(m.totIn,0.01)):'N/A'],
             ['Est. egress cost','~$'+r2(m.totOut*0.087)+' (West Europe)']].map(([k,v])=>rowEl(k,v)),
         el('div',{style:{marginTop:'10px',fontSize:'11px',color:'#9ca3af'}},['* Egress estimate at $0.087/GB. Actual pricing varies by region.'])])]));
  }

  // ── Recommendations ──
  else if (S.tab==='recommendations') {
    const list=el('div',{style:{display:'flex',flexDirection:'column',gap:'13px'}});
    rep.recs.forEach(r=>{
      const s=SEV[r.sev];
      list.append(el('div',{style:{background:s.bg,borderRadius:'12px',border:`1px solid ${s.border}`,padding:'18px',borderLeft:`5px solid ${s.text}`}},
        [el('div',{style:{display:'flex',gap:'13px',alignItems:'flex-start'}},
          [el('span',{style:{background:s.text,color:'white',fontSize:'10px',fontWeight:'800',padding:'3px 8px',borderRadius:'99px',whiteSpace:'nowrap',marginTop:'2px',flexShrink:'0'}},[s.label]),
           el('div',{style:{flex:'1'}},
             [el('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap',marginBottom:'5px'}},
               [el('span',{style:{fontWeight:'800',fontSize:'14px',color:'#111827'}},[r.icon+' '+r.title]),
                el('span',{style:{background:'#f3f4f6',color:'#374151',fontSize:'11px',fontWeight:'600',padding:'2px 7px',borderRadius:'99px'}},[r.cat])]),
              el('p',{style:{margin:'0 0 7px',fontSize:'13px',color:'#4b5563',lineHeight:'1.5'}},[r.detail]),
              el('div',{style:{fontSize:'13px',color:'#374151'}},[el('strong',{},'🎯 Action: '),r.action]),
              r.savings?el('div',{style:{marginTop:'5px',fontSize:'13px',color:'#059669',fontWeight:'700'}},['💰 '+r.savings]):null
             ].filter(Boolean))])]));
    });
    content.append(list);
  }

  // ── Details ──
  else if (S.tab==='details') {
    content.append(el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}},
      [card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'14px'}},['🖥️ VM Configuration']),
         ...[['Name',vd?.name],['Resource Group',S.selRG],['Location',vd?.location],
             ['VM Size',m.vmSize],['vCPU / RAM',`${m.si.vcpu} vCPU / ${m.si.ram} GB`],
             ['OS Type',os],['OS Disk SKU',vd?.properties?.storageProfile?.osDisk?.managedDisk?.storageAccountType||'—'],
             ['Image Offer',vd?.properties?.storageProfile?.imageReference?.offer||'Custom'],
             ['Power State',pw],['Provisioning',vd?.properties?.provisioningState],
             ['Est. Monthly Cost',`~$${rep.monthlyCost}`]].map(([k,v])=>rowEl(k,String(v||'—')))]),
       el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}},
         [card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'12px'}},['🏷️ Tags']),
            Object.keys(tags).length===0
              ?el('div',{style:{color:'#9ca3af',fontSize:'13px'}},['⚠️ No tags found on this VM.'])
              :el('div',{},[...Object.entries(tags).map(([k,v])=>rowEl(k,v))])]),
          card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'12px'}},['📦 Attached Disks']),
            ...disks.map((d,i)=>el('div',{style:{background:'#f8fafc',borderRadius:'8px',padding:'10px',marginBottom:'8px'}},
              [el('div',{style:{fontWeight:'700',fontSize:'13px'}},[d.name||'(unnamed)']),
               el('div',{style:{color:'#6b7280',fontSize:'12px',marginTop:'2px'}},
                 [(d.diskSizeGB?d.diskSizeGB+' GB':'?')+' · '+
                  (d.managedDisk?.storageAccountType||'Unmanaged')+' · '+
                  (i===0?'OS Disk':'Data Disk LUN '+d.lun)])]))])])]));
  }

  body.append(content);
  wrap.append(hdr,body);
  return wrap;
};

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
handlePKCECallback().then(()=>render());
</script>
</body>
</html>
