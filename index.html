<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Azure VM Optimizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#111827}
input,textarea,button{font-family:inherit;outline:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.tab-btn{padding:7px 16px;border-radius:7px;border:none;cursor:pointer;font-weight:600;font-size:12px;transition:all .15s}
.tab-btn.active{background:#2563eb;color:white}
.tab-btn:not(.active){background:transparent;color:#6b7280}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Config — UPDATE THESE WITH YOUR VALUES ──────────────────
const CONFIG = {
  tenantId:  'YOUR_TENANT_ID',   // e.g. afadec18-0533-4cba-8578-531625 2ff93f
  clientId:  'YOUR_CLIENT_ID',   // App Registration client ID
};
// ────────────────────────────────────────────────────────────

const MGMT = 'https://management.azure.com';
const VM_CATALOG = {
  'Standard_B1s':{v:1,r:1,c:0.011},'Standard_B2ms':{v:2,r:8,c:0.083},
  'Standard_B4ms':{v:4,r:16,c:0.166},'Standard_B8ms':{v:8,r:32,c:0.333},
  'Standard_D2s_v3':{v:2,r:8,c:0.096},'Standard_D4s_v3':{v:4,r:16,c:0.192},
  'Standard_D8s_v3':{v:8,r:32,c:0.384},'Standard_D2s_v5':{v:2,r:8,c:0.096},
  'Standard_D4s_v5':{v:4,r:16,c:0.192},'Standard_D8s_v5':{v:8,r:32,c:0.384},
  'Standard_D16s_v5':{v:16,r:64,c:0.768},'Standard_D2ads_v5':{v:2,r:8,c:0.096},
  'Standard_D4ads_v5':{v:4,r:16,c:0.192},'Standard_D8ads_v5':{v:8,r:32,c:0.384},
  'Standard_D16ads_v5':{v:16,r:64,c:0.768},'Standard_D32ads_v5':{v:32,r:128,c:1.536},
  'Standard_E2s_v3':{v:2,r:16,c:0.126},'Standard_E4s_v3':{v:4,r:32,c:0.252},
  'Standard_E8s_v3':{v:8,r:64,c:0.504},'Standard_E16s_v3':{v:16,r:128,c:1.008},
  'Standard_E2ads_v5':{v:2,r:16,c:0.126},'Standard_E4ads_v5':{v:4,r:32,c:0.252},
  'Standard_E8ads_v5':{v:8,r:64,c:0.504},'Standard_E16ads_v5':{v:16,r:128,c:1.008},
  'Standard_F2s_v2':{v:2,r:4,c:0.085},'Standard_F4s_v2':{v:4,r:8,c:0.170},
  'Standard_F8s_v2':{v:8,r:16,c:0.338},'Standard_F16s_v2':{v:16,r:32,c:0.676},
};
const SEV={
  critical:{bg:'#fef2f2',bd:'#fca5a5',tx:'#dc2626',lbl:'CRITICAL'},
  high:    {bg:'#fff7ed',bd:'#fdba74',tx:'#ea580c',lbl:'HIGH'},
  medium:  {bg:'#fffbeb',bd:'#fcd34d',tx:'#d97706',lbl:'MEDIUM'},
  low:     {bg:'#eff6ff',bd:'#93c5fd',tx:'#2563eb',lbl:'LOW'},
  info:    {bg:'#f5f3ff',bd:'#c4b5fd',tx:'#7c3aed',lbl:'INFO'},
};
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
const sum=a=>a.reduce((x,y)=>x+y,0);
const r2=v=>Math.round(v*100)/100;
const r1=v=>Math.round(v*10)/10;
const pct=(a,p)=>{if(!a.length)return 0;const s=[...a].sort((x,y)=>x-y);return s[Math.floor(p/100*s.length)]||0;};
const scC=s=>s>=80?'#16a34a':s>=60?'#d97706':'#dc2626';
const scBg=s=>s>=80?'#f0fdf4':s>=60?'#fffbeb':'#fef2f2';
const $=id=>document.getElementById(id);

// ── PKCE ────────────────────────────────────────────────────
const genVerifier=()=>{const a=new Uint8Array(32);crypto.getRandomValues(a);return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');};
const genChallenge=async v=>{const e=new TextEncoder().encode(v);const h=await crypto.subtle.digest('SHA-256',e);return btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');};

// ── State ────────────────────────────────────────────────────
let S={
  phase:'auth', token:null,
  subs:[],selSub:null,rgs:[],selRG:null,vms:[],selVM:null,
  vmDetail:null,metrics:null,report:null,
  tab:'overview',busy:false,err:null,subQ:''
};
const setState=p=>{Object.assign(S,p);render();};

// ── Azure API ────────────────────────────────────────────────
const az=async(url,tok)=>{
  const r=await fetch(url,{headers:{Authorization:`Bearer ${tok||S.token}`}});
  if(!r.ok){const t=await r.text();throw new Error(`Azure ${r.status}: ${t.slice(0,300)}`);}
  return r.json();
};

// ── PKCE Flow ────────────────────────────────────────────────
const startLogin=async()=>{
  const verifier=genVerifier(),challenge=await genChallenge(verifier);
  const redirect=location.href.split('?')[0].split('#')[0];
  sessionStorage.setItem('pkce_v',verifier);
  sessionStorage.setItem('pkce_r',redirect);
  const params=new URLSearchParams({
    client_id:CONFIG.clientId,response_type:'code',redirect_uri:redirect,
    scope:'https://management.azure.com/user_impersonation offline_access',
    code_challenge:challenge,code_challenge_method:'S256',response_mode:'query'
  });
  location.href=`https://login.microsoftonline.com/${CONFIG.tenantId}/oauth2/v2.0/authorize?${params}`;
};

const handleCallback=async()=>{
  const p=new URLSearchParams(location.search);
  const code=p.get('code'),errP=p.get('error');
  if(errP){setState({err:p.get('error_description')||errP,phase:'auth'});return;}
  if(!code)return;
  const verifier=sessionStorage.getItem('pkce_v');
  const redirect=sessionStorage.getItem('pkce_r');
  sessionStorage.removeItem('pkce_v');sessionStorage.removeItem('pkce_r');
  history.replaceState({},'',location.pathname);
  setState({busy:true,phase:'auth'});
  try{
    const r=await fetch(`https://login.microsoftonline.com/${CONFIG.tenantId}/oauth2/v2.0/token`,{
      method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({client_id:CONFIG.clientId,code,redirect_uri:redirect,
        grant_type:'authorization_code',code_verifier:verifier})
    });
    const d=await r.json();
    if(!d.access_token)throw new Error(d.error_description||d.error||'Token exchange failed');
    const subs=await az(`${MGMT}/subscriptions?api-version=2022-12-01`,d.access_token);
    setState({token:d.access_token,subs:subs.value||[],phase:'browse',busy:false,err:null});
  }catch(e){setState({err:e.message,phase:'auth',busy:false});}
};

// ── Metrics & Report ─────────────────────────────────────────
const fetchMetrics=async(vmId,token)=>{
  const end=new Date().toISOString(),start=new Date(Date.now()-7*24*3600*1000).toISOString(),ts=`${start}/${end}`;
  const batches=[['Percentage CPU'],['Network In Total','Network Out Total'],['Network In','Network Out'],
    ['Disk Read Bytes/sec','Disk Write Bytes/sec'],['Disk Read Bytes','Disk Write Bytes'],
    ['Disk Read Operations/Sec','Disk Write Operations/Sec'],
    ['OS Disk Read Bytes/sec','OS Disk Write Bytes/sec'],
    ['OS Disk Read Operations/Sec','OS Disk Write Operations/Sec'],
    ['Data Disk Read Bytes/sec','Data Disk Write Bytes/sec'],
    ['Data Disk Read Operations/Sec','Data Disk Write Operations/Sec']];
  const all=[],seen=new Set();
  for(const batch of batches){
    const key=batch[0].toLowerCase().replace(/\s|\/sec|total|bytes/g,'');
    if(seen.has(key))continue;
    try{
      const r=await az(`${MGMT}${vmId}/providers/Microsoft.Insights/metrics?api-version=2023-10-01&timespan=${ts}&interval=PT1H&metricnames=${encodeURIComponent(batch.join(','))}&aggregation=Average,Maximum,Minimum`,token);
      const valid=(r.value||[]).filter(m=>m.timeseries?.[0]?.data?.some(d=>d.average!=null));
      if(valid.length>0){all.push(...valid);seen.add(key);}
    }catch(_){}
  }
  let memMetric=null;
  try{const m=await az(`${MGMT}${vmId}/providers/Microsoft.Insights/metrics?api-version=2023-10-01&timespan=${ts}&interval=PT1H&metricnames=Available%20Memory%20Bytes&aggregation=Average`,token);memMetric=m.value?.[0];}catch(_){}
  return{all,memMetric};
};

const processMetrics=(vals,memMetric,detail)=>{
  const gm=(...ns)=>{for(const n of ns){const f=vals.find(m=>m.name.value===n||m.name.localizedValue===n);if(f)return f;}return null;};
  const pts=m=>m?.timeseries?.[0]?.data||[];
  const avgs=m=>pts(m).map(d=>d.average).filter(v=>v!=null);
  const maxs=m=>pts(m).map(d=>d.maximum||d.average||0);
  const cpu=gm('Percentage CPU');
  const ca=avgs(cpu),cm=maxs(cpu);
  const cpuAvg=r1(avg(ca)),cpuMax=r1(cm.length?Math.max(0,...cm):0);
  const cpuMin=r1(ca.filter(v=>v>0).length?Math.min(...ca.filter(v=>v>0)):0);
  const cpuP95=r1(pct(ca,95));
  const vmSize=detail.properties?.hardwareProfile?.vmSize;
  const si=VM_CATALOG[vmSize]||{v:2,r:8,c:0.096};
  let memPct=null;
  if(memMetric){const a=avg(avgs(memMetric));if(a>0)memPct=r1(((si.r*1073741824-a)/(si.r*1073741824))*100);}
  const diskR=gm('Disk Read Bytes/sec','Disk Read Bytes','OS Disk Read Bytes/sec');
  const diskW=gm('Disk Write Bytes/sec','Disk Write Bytes','OS Disk Write Bytes/sec');
  const diskRO=gm('Disk Read Operations/Sec','OS Disk Read Operations/Sec');
  const diskWO=gm('Disk Write Operations/Sec','OS Disk Write Operations/Sec');
  const ddR=gm('Data Disk Read Bytes/sec','Data Disk Read Bytes');
  const ddW=gm('Data Disk Write Bytes/sec','Data Disk Write Bytes');
  const ddRO=gm('Data Disk Read Operations/Sec');
  const ddWO=gm('Data Disk Write Operations/Sec');
  const netIn=gm('Network In Total','Network In');
  const netOut=gm('Network Out Total','Network Out');
  const MB=1048576;
  const mk=(m,d=1)=>{const a=avgs(m);return r2(a.length?avg(a)/d:0);};
  const mx=(m,d=1)=>{const a=avgs(m);return r2(a.length?Math.max(0,...a)/d:0);};
  const dm={};
  pts(cpu).forEach(d=>{if(d.average==null)return;const day=d.timeStamp.slice(0,10);if(!dm[day])dm[day]=[];dm[day].push(d.average);});
  const chartData=Object.entries(dm).map(([day,c])=>({date:day.slice(5),avgCPU:r1(avg(c)),maxCPU:r1(Math.max(...c))}));
  return{vmSize,si,cpuAvg,cpuMax,cpuMin,cpuP95,memPct,
    avgDiskR:mk(diskR,MB),avgDiskW:mk(diskW,MB),
    avgROps:Math.round(mk(diskRO)),avgWOps:Math.round(mk(diskWO)),
    maxROps:Math.round(mx(diskRO)),maxWOps:Math.round(mx(diskWO)),
    avgDdR:mk(ddR,MB),avgDdW:mk(ddW,MB),
    avgDdROps:Math.round(mk(ddRO)),avgDdWOps:Math.round(mk(ddWO)),
    totIn:r2(sum(avgs(netIn))/1073741824),totOut:r2(sum(avgs(netOut))/1073741824),chartData};
};

const buildReport=(m,detail)=>{
  const recs=[];let score=100;
  if(m.cpuAvg<5){score-=35;recs.push({sev:'critical',cat:'Cost/Right-Sizing',icon:'🔴',title:'Severely underutilized CPU',detail:`Avg CPU only ${m.cpuAvg}% over 7 days.`,action:'Downsize or deallocate.',savings:'Up to 70–80% cost reduction'});}
  else if(m.cpuAvg<20&&m.cpuMax<60){score-=20;recs.push({sev:'high',cat:'Cost/Right-Sizing',icon:'🟠',title:'CPU over-provisioned',detail:`Avg: ${m.cpuAvg}%, peak: ${m.cpuMax}%.`,action:'Consider halving vCPU count.',savings:'30–50% cost reduction'});}
  else if(m.cpuAvg>85||m.cpuMax>95){score-=25;recs.push({sev:'critical',cat:'Performance',icon:'🔴',title:'CPU saturation',detail:`Avg: ${m.cpuAvg}%, peak: ${m.cpuMax}%, p95: ${m.cpuP95}%.`,action:'Scale up or enable Autoscale.',savings:'N/A'});}
  else if(m.cpuAvg>70){score-=10;recs.push({sev:'medium',cat:'Performance',icon:'🟡',title:'Elevated CPU',detail:`Avg ${m.cpuAvg}%.`,action:'Plan scale-up.',savings:'Preventive'});}
  if(m.memPct!==null){
    if(m.memPct>85){score-=20;recs.push({sev:'critical',cat:'Memory',icon:'🔴',title:'High memory pressure',detail:`${m.memPct}% used.`,action:'Upgrade to E-series SKU.',savings:'N/A'});}
    else if(m.memPct<20){score-=10;recs.push({sev:'medium',cat:'Memory',icon:'🟡',title:'Low memory utilization',detail:`Only ${m.memPct}% used.`,action:'Move to smaller RAM SKU.',savings:'15–30% cost reduction'});}
  }
  if(m.avgROps<1&&m.avgWOps<1&&m.avgDiskR<0.1&&m.avgDiskW<0.1){score-=5;recs.push({sev:'low',cat:'Storage',icon:'🔵',title:'Negligible OS disk I/O',detail:`Read: ${m.avgDiskR} MB/s, Write: ${m.avgDiskW} MB/s.`,action:'Downgrade to Standard SSD.',savings:'$15–30/month'});}
  else if(m.maxROps>5000||m.maxWOps>5000){score-=10;recs.push({sev:'medium',cat:'Storage',icon:'🟡',title:'Peak IOPS are high',detail:`Peak: Read ${m.maxROps}, Write ${m.maxWOps}.`,action:'Ensure Premium SSD or Ultra Disk.',savings:'Performance'});}
  if(m.avgDdROps<5&&m.avgDdWOps<5&&(m.avgDdR>0||m.avgDdW>0)){recs.push({sev:'low',cat:'Storage',icon:'🔵',title:'Data disk low IOPS',detail:`Read: ${m.avgDdROps}, Write: ${m.avgDdWOps} IOPS.`,action:'Move to Standard HDD/SSD.',savings:'Up to 60% disk saving'});}
  const rs=rightSize(m);
  if(rs&&rs.size!==m.vmSize){const cur=m.si.c,nc=VM_CATALOG[rs.size]?.c||cur;if(nc<cur){const sp=Math.round((cur-nc)/cur*100),sm=Math.round((cur-nc)*730);recs.push({sev:'high',cat:'Right-Sizing',icon:'🟠',title:`Recommended: ${rs.size}`,detail:`${m.vmSize}→${rs.size}. ${rs.reason}`,action:'Resize via Azure Portal → VM → Size.',savings:`~${sp}% (~$${sm}/mo)`});}}
  recs.push({sev:'info',cat:'Cost',icon:'🟣',title:'Consider Reserved Instances',detail:`1- or 3-year reservations unlock major discounts.`,action:'Azure Portal → Reservations.',savings:'Up to 40–72% vs PAYG'});
  recs.push({sev:'info',cat:'Governance',icon:'🟣',title:'Enable auto-shutdown',detail:'Reduces idle costs for non-prod VMs.',action:'Azure Portal → VM → Auto-shutdown.',savings:'Up to 60%'});
  const tags=detail.tags||{},missing=['Environment','Owner','CostCenter','Application'].filter(t=>!tags[t]);
  if(missing.length){score-=5;recs.push({sev:'low',cat:'Governance',icon:'🔵',title:`Missing tags: ${missing.join(', ')}`,detail:'Untagged resources make cost attribution difficult.',action:'Add standard tags.',savings:'Better governance'});}
  recs.push({sev:'info',cat:'Tooling',icon:'🟣',title:'Enable Azure Advisor',detail:'Continuously surfaces recommendations.',action:'Navigate to Azure Advisor.',savings:'Ongoing'});
  return{score:Math.max(0,Math.round(score)),recs,monthlyCost:r2(m.si.c*730),rs};
};
const rightSize=m=>{
  let tc=m.si.v,tr=m.si.r;
  if(m.cpuAvg<10)tc=Math.max(1,Math.floor(m.si.v/2));else if(m.cpuAvg>80)tc=m.si.v*2;
  if(m.memPct!==null){if(m.memPct<20)tr=Math.max(1,Math.floor(m.si.r/2));else if(m.memPct>85)tr=m.si.r*2;}
  let best=null,bd=Infinity;
  for(const[sz,info]of Object.entries(VM_CATALOG)){if(info.v>=tc&&info.r>=tr){const d=(info.v-tc)*2+(info.r-tr);if(d<bd){bd=d;best=sz;}}}
  return best?{size:best,reason:`Target: ${tc} vCPU / ${tr} GB RAM.`}:null;
};

// ── DOM helpers ──────────────────────────────────────────────
const el=(tag,props={},children=[])=>{
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='className')e.className=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  const kids=Array.isArray(children)?children:[children];
  kids.forEach(c=>{if(c!=null)e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
};
const card=(children=[],style={})=>el('div',{style:{background:'white',borderRadius:'12px',border:'1px solid #e5e7eb',boxShadow:'0 1px 3px rgba(0,0,0,.06)',padding:'20px',...style}},children);
const btn=(label,onClick,opts={})=>{
  const{variant='primary',disabled=false,sm=false,full=false}=opts;
  const th={primary:{background:'#2563eb',color:'white',border:'none'},secondary:{background:'white',color:'#374151',border:'1px solid #d1d5db'},ghost:{background:'transparent',color:'#6b7280',border:'none'}};
  const b=el('button',{style:{...th[variant],borderRadius:'8px',cursor:disabled?'not-allowed':'pointer',fontWeight:'600',fontSize:sm?'12px':'14px',padding:sm?'7px 14px':'11px 22px',opacity:disabled?.55:1,width:full?'100%':'auto',transition:'all .15s'}},[label]);
  if(!disabled&&onClick)b.addEventListener('click',onClick);
  return b;
};
const errBox=msg=>msg?el('div',{style:{background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:'8px',padding:'10px 14px',marginBottom:'14px',fontSize:'13px',color:'#dc2626'}},['⚠️ '+msg]):null;
const statCard=(label,value,unit='',sub='',color='#1d4ed8',warn=false)=>
  el('div',{style:{background:'white',borderRadius:'12px',border:`1.5px solid ${warn?'#fca5a5':'#e5e7eb'}`,padding:'16px 18px',textAlign:'center'}},
    [el('div',{style:{fontSize:'11px',color:'#6b7280',fontWeight:'700',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'6px'}},[label]),
     el('div',{style:{fontSize:'26px',fontWeight:'900',color,lineHeight:'1'}},[String(value),el('span',{style:{fontSize:'13px',fontWeight:'500',color:'#6b7280',marginLeft:'2px'}},unit?[unit]:[])]),
     sub?el('div',{style:{fontSize:'11px',color:'#9ca3af',marginTop:'4px'}},[sub]):null].filter(Boolean));
const rowEl=(k,v)=>el('div',{style:{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #f3f4f6',fontSize:'13px'}},
  [el('span',{style:{color:'#6b7280'}},[k]),el('span',{style:{fontWeight:'600',color:'#111827',maxWidth:'250px',textAlign:'right',wordBreak:'break-all'}},[String(v||'—')])]);
const barTable=rows=>{
  const mx=Math.max(...rows.map(r=>parseFloat(r.v)||0),1);
  const t=el('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'13px'}});
  const tb=el('tbody');
  rows.forEach(r=>{
    const bar=el('div',{style:{background:'#f3f4f6',borderRadius:'4px',overflow:'hidden',minWidth:'80px'}},
      [el('div',{style:{height:'8px',borderRadius:'4px',background:'#2563eb',width:Math.round((parseFloat(r.v)||0)/mx*100)+'%',minWidth:'2px'}})]);
    tb.append(el('tr',{style:{borderBottom:'1px solid #f3f4f6'}},
      [el('td',{style:{padding:'7px 8px',color:'#6b7280',whiteSpace:'nowrap'}},[r.name]),
       el('td',{style:{padding:'7px 8px',textAlign:'right',fontWeight:'700',color:'#111827'}},[String(r.v)]),
       el('td',{style:{padding:'7px 8px',minWidth:'100px'}},[bar])]));
  });
  t.append(tb);return t;
};
const cpuTable=data=>{
  const t=el('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'13px'}});
  t.append(el('thead',{},[el('tr',{},[
    el('th',{style:{textAlign:'left',padding:'6px 8px',borderBottom:'2px solid #e5e7eb',color:'#6b7280',fontWeight:'600'}},['Date']),
    el('th',{style:{textAlign:'right',padding:'6px 8px',borderBottom:'2px solid #e5e7eb',color:'#6b7280',fontWeight:'600'}},['Avg %']),
    el('th',{style:{textAlign:'right',padding:'6px 8px',borderBottom:'2px solid #e5e7eb',color:'#6b7280',fontWeight:'600'}},['Max %']),
    el('th',{style:{padding:'6px 8px',borderBottom:'2px solid #e5e7eb'}},['Trend'])])]);
  const tb=el('tbody');
  if(!data.length)tb.append(el('tr',{},[el('td',{colspan:'4',style:{padding:'12px',color:'#9ca3af',textAlign:'center'}},['No data'])]));
  data.forEach(d=>{
    const col=d.avgCPU>80?'#dc2626':d.avgCPU>50?'#f59e0b':'#2563eb';
    const bar=el('div',{style:{background:'#f3f4f6',borderRadius:'4px',overflow:'hidden',minWidth:'100px'}},
      [el('div',{style:{height:'8px',borderRadius:'4px',background:col,width:Math.round(d.avgCPU)+'%',minWidth:'2px'}})]);
    tb.append(el('tr',{style:{borderBottom:'1px solid #f3f4f6'}},
      [el('td',{style:{padding:'7px 8px',fontWeight:'600',color:'#374151'}},[d.date]),
       el('td',{style:{padding:'7px 8px',textAlign:'right',color:col,fontWeight:'700'}},[d.avgCPU+'%']),
       el('td',{style:{padding:'7px 8px',textAlign:'right',color:'#9ca3af'}},[d.maxCPU+'%']),
       el('td',{style:{padding:'7px 8px'}},[bar])]));
  });
  t.append(tb);return t;
};

// ── Render ───────────────────────────────────────────────────
function render(){
  const app=$('app');app.innerHTML='';
  if(S.phase==='auth')      app.appendChild(renderAuth());
  else if(S.phase==='browse')app.appendChild(renderBrowse());
  else if(S.phase==='analyze'&&S.report&&S.metrics)app.appendChild(renderAnalyze());
  else app.appendChild(el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'#6b7280'}},['🔄 Loading...']));
}

// ── AUTH SCREEN ──────────────────────────────────────────────
function renderAuth(){
  const wrap=el('div',{style:{minHeight:'100vh',background:'linear-gradient(145deg,#0f172a 0%,#1e3a8a 60%,#1d4ed8 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}});
  const inner=el('div',{style:{width:'100%',maxWidth:'420px'}});
  const hero=el('div',{style:{textAlign:'center',marginBottom:'28px',color:'white'}},
    [el('div',{style:{fontSize:'52px',marginBottom:'8px'}},['☁️']),
     el('h1',{style:{fontSize:'26px',fontWeight:'900',color:'white',marginBottom:'6px'}},['Azure VM Optimizer']),
     el('p',{style:{color:'#93c5fd',fontSize:'13px'}},['Analyze and optimize your Azure Virtual Machines'])]);

  const c=card([],{padding:'28px'});

  if(S.busy){
    c.append(el('div',{style:{textAlign:'center',padding:'20px 0',color:'#6b7280'}},
      [el('div',{style:{fontSize:'32px',marginBottom:'12px'}},['🔄']),
       el('div',{style:{fontWeight:'600',fontSize:'14px',color:'#374151'}},['Completing sign-in...'])]));
  } else {
    const eb=errBox(S.err);if(eb)c.append(eb);

    // Microsoft Sign-in button
    const msBtn=el('button',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'12px',
      width:'100%',padding:'13px 20px',background:'white',border:'1.5px solid #d1d5db',
      borderRadius:'10px',cursor:'pointer',fontSize:'15px',fontWeight:'600',color:'#374151',
      boxShadow:'0 1px 3px rgba(0,0,0,.1)',marginBottom:'20px',transition:'all .15s'}});
    // Microsoft logo squares
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','21');svg.setAttribute('height','21');svg.setAttribute('viewBox','0 0 21 21');
    [['#f25022',1,1],['#7fba00',11,1],['#00a4ef',1,11],['#ffb900',11,11]].forEach(([fill,x,y])=>{
      const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x',x);rect.setAttribute('y',y);rect.setAttribute('width','9');rect.setAttribute('height','9');rect.setAttribute('fill',fill);svg.append(rect);
    });
    msBtn.append(svg,document.createTextNode('Sign in with Microsoft'));
    msBtn.addEventListener('click',startLogin);
    c.append(msBtn);

    c.append(el('div',{style:{textAlign:'center',fontSize:'12px',color:'#9ca3af',marginBottom:'20px'}},
      ['Supports MFA · Redirects to Microsoft login · No credentials stored']));

    // Info box
    c.append(el('div',{style:{background:'#f8fafc',borderRadius:'8px',padding:'12px 14px',fontSize:'12px',color:'#6b7280'}},
      [el('strong',{style:{color:'#374151'}},['ℹ️ First time? ']),
       'You need an App Registration in Entra ID with this page\'s URL set as the SPA Redirect URI and Azure Service Management → user_impersonation permission granted.']));
  }

  inner.append(hero,c);
  wrap.append(inner);
  return wrap;
}

// ── BROWSE SCREEN ────────────────────────────────────────────
function renderBrowse(){
  const go=async fn=>{setState({busy:true,err:null});try{await fn();}catch(e){setState({err:e.message});}finally{setState({busy:false});};};

  const wrap=el('div',{style:{minHeight:'100vh',background:'#f8fafc'}});
  const hdr=el('div',{style:{background:'white',borderBottom:'1px solid #e5e7eb',padding:'12px 24px',display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}});
  const soBtn=btn('Sign out',()=>setState({token:null,phase:'auth',subs:[],selSub:null,rgs:[],selRG:null,vms:[]}),{variant:'secondary',sm:true});
  soBtn.style.marginLeft='auto';
  hdr.append(
    el('span',{style:{fontSize:'22px'}},['☁️']),
    el('span',{style:{fontWeight:'800',fontSize:'15px',color:'#111827'}},['Azure VM Optimizer']),
    el('span',{style:{background:'#dcfce7',color:'#15803d',fontSize:'11px',fontWeight:'700',padding:'2px 10px',borderRadius:'99px'}},['👤 Signed in']),
    S.busy?el('span',{style:{color:'#6b7280',fontSize:'12px'}},['🔄 Loading...']):null,
    soBtn
  );

  const body=el('div',{style:{maxWidth:'960px',margin:'0 auto',padding:'24px'}});
  const eb=errBox(S.err);if(eb)body.append(eb);

  const grid=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}});

  // Subscriptions with search
  const filtSubs=S.subs.filter(s=>s.displayName.toLowerCase().includes(S.subQ.toLowerCase())||s.subscriptionId.toLowerCase().includes(S.subQ.toLowerCase()));
  const subList=el('div',{style:{display:'flex',flexDirection:'column',gap:'7px',maxHeight:'320px',overflowY:'auto'}});
  filtSubs.forEach(s=>{
    const active=S.selSub?.subscriptionId===s.subscriptionId;
    const b=el('button',{style:{textAlign:'left',padding:'10px 13px',borderRadius:'8px',border:'1.5px solid',borderColor:active?'#2563eb':'#e5e7eb',background:active?'#eff6ff':'white',cursor:'pointer',fontSize:'13px'}},
      [el('div',{style:{fontWeight:'700',color:'#111827'}},[s.displayName]),
       el('div',{style:{color:'#9ca3af',fontSize:'11px',fontFamily:'monospace',marginTop:'2px'}},[s.subscriptionId])]);
    b.addEventListener('click',()=>go(async()=>{
      setState({selSub:s,rgs:[],vms:[],selRG:null});
      const r=await az(`${MGMT}/subscriptions/${s.subscriptionId}/resourcegroups?api-version=2023-07-01`);
      setState({rgs:r.value||[]});
    }));
    subList.append(b);
  });
  const srch=el('input',{type:'text',value:S.subQ,placeholder:'🔍 Search subscriptions...',
    style:{width:'100%',padding:'8px 12px',border:'1.5px solid #e5e7eb',borderRadius:'8px',fontSize:'12px',marginBottom:'10px',boxSizing:'border-box'}});
  srch.addEventListener('input',e=>{ S.subQ=e.target.value; render(); });
  grid.append(card([el('h3',{style:{fontSize:'13px',fontWeight:'700',color:'#374151',marginBottom:'10px'}},['📋 Subscription']),srch,subList]));

  // Resource groups
  if(S.selSub){
    const rgList=el('div',{style:{display:'flex',flexDirection:'column',gap:'7px',maxHeight:'320px',overflowY:'auto'}});
    S.rgs.forEach(rg=>{
      const active=S.selRG===rg.name;
      const b=el('button',{style:{textAlign:'left',padding:'9px 13px',borderRadius:'8px',border:'1.5px solid',borderColor:active?'#2563eb':'#e5e7eb',background:active?'#eff6ff':'white',cursor:'pointer',fontSize:'13px',fontWeight:'600',color:'#111827'}},
        ['📁 '+rg.name,el('span',{style:{color:'#9ca3af',fontWeight:'400',fontSize:'11px',marginLeft:'6px'}},[rg.location])]);
      b.addEventListener('click',()=>go(async()=>{
        setState({selRG:rg.name,vms:[]});
        const sid=S.selSub.subscriptionId;let found=[];
        for(const api of['2024-03-01','2023-09-01','2023-03-01']){
          try{const r=await az(`${MGMT}/subscriptions/${sid}/resourceGroups/${encodeURIComponent(rg.name)}/providers/Microsoft.Compute/virtualMachines?api-version=${api}`);found=r.value||[];if(found.length)break;}catch(_){}
        }
        if(!found.length){const r=await az(`${MGMT}/subscriptions/${sid}/providers/Microsoft.Compute/virtualMachines?api-version=2023-03-01`);found=(r.value||[]).filter(v=>{const p=v.id.split('/'),i=p.findIndex(x=>x.toLowerCase()==='resourcegroups');return i>=0&&p[i+1]?.toLowerCase()===rg.name.toLowerCase();});}
        setState({vms:found,err:found.length?null:`No VMs found in "${rg.name}".`});
      }));
      rgList.append(b);
    });
    grid.append(card([el('h3',{style:{fontSize:'13px',fontWeight:'700',color:'#374151',marginBottom:'10px'}},['📁 Resource Group']),rgList]));
  }
  body.append(grid);

  // Show all VMs button
  if(S.selSub){
    const allBtn=btn('🔍 Show ALL VMs in subscription',()=>go(async()=>{
      setState({selRG:'(All VMs)',vms:[]});
      const r=await az(`${MGMT}/subscriptions/${S.selSub.subscriptionId}/providers/Microsoft.Compute/virtualMachines?api-version=2023-03-01`);
      const found=r.value||[];setState({vms:found,err:found.length?null:'No VMs found.'});
    }),{variant:'secondary',sm:true});
    body.append(el('div',{style:{marginBottom:'14px'}},[allBtn]));
  }

  // VMs
  if(S.vms.length>0){
    const vmGrid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:'12px'}});
    S.vms.forEach(vm=>{
      const sz=vm.properties?.hardwareProfile?.vmSize||'';
      const info=VM_CATALOG[sz];
      const vmos=vm.properties?.storageProfile?.osDisk?.osType||'Linux';
      const parts=vm.id.split('/'),rgi=parts.findIndex(p=>p.toLowerCase()==='resourcegroups');
      const vmRG=rgi>=0?parts[rgi+1]:'';
      const aBtn=btn(S.busy?'⏳ Analyzing...':'🔍 Analyze & Optimize',()=>go(async()=>{
        setState({selVM:vm,report:null,metrics:null});
        const detail=await az(`${MGMT}${vm.id}?api-version=2023-07-01&$expand=instanceView`);
        setState({vmDetail:detail});
        const{all,memMetric}=await fetchMetrics(vm.id,S.token);
        const proc=processMetrics(all,memMetric,detail);
        setState({metrics:proc,report:buildReport(proc,detail),phase:'analyze',tab:'overview'});
      }),{sm:true,disabled:S.busy});
      vmGrid.append(el('div',{style:{border:'1.5px solid #e5e7eb',borderRadius:'10px',padding:'16px',background:'white'}},
        [el('div',{style:{fontWeight:'700',fontSize:'14px',color:'#111827',marginBottom:'3px'}},[(vmos==='Windows'?'🪟':'🐧')+' '+vm.name]),
         el('div',{style:{fontSize:'11px',color:'#9ca3af',marginBottom:'6px'}},[vm.location+(vmRG?' · 📁 '+vmRG:'')]),
         el('div',{style:{fontSize:'12px',color:'#374151',marginBottom:'12px'}},
           [el('strong',{},[sz]),info?el('span',{style:{color:'#6b7280'}},` · ${info.v} vCPU · ${info.r} GB · ~$${r2(info.c*730)}/mo`):null].filter(Boolean)),
         aBtn]));
    });
    body.append(card([el('h3',{style:{fontSize:'13px',fontWeight:'700',color:'#374151',marginBottom:'14px'}},
      ['🖥️ Virtual Machines — ',el('span',{style:{color:'#2563eb'}},[S.selRG||''])]),vmGrid]));
  } else if(S.selSub&&!S.busy&&!S.err){
    body.append(card([el('div',{style:{color:'#9ca3af',fontSize:'13px'}},['Select a resource group or click "Show ALL VMs".'])]));
  }

  wrap.append(hdr,body);
  return wrap;
}

// ── ANALYZE SCREEN ───────────────────────────────────────────
function renderAnalyze(){
  const m=S.metrics,rep=S.report,vd=S.vmDetail;
  const tags=vd?.tags||{};
  const os=vd?.properties?.storageProfile?.osDisk?.osType||'Linux';
  const pw=vd?.properties?.instanceView?.statuses?.find(s=>s.code?.startsWith('PowerState/'))?.displayStatus||'Unknown';
  const disks=[vd?.properties?.storageProfile?.osDisk,...(vd?.properties?.storageProfile?.dataDisks||[])].filter(Boolean);
  const TABS=['overview','cpu','disk','network','recommendations','details'];

  const wrap=el('div',{style:{minHeight:'100vh',background:'#f8fafc'}});
  const hdr=el('div',{style:{background:'white',borderBottom:'1px solid #e5e7eb',padding:'12px 24px',display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}});
  const pwBadge=el('span',{style:{marginLeft:'auto',background:pw.includes('running')?'#dcfce7':'#fef3c7',color:pw.includes('running')?'#15803d':'#92400e',fontSize:'11px',fontWeight:'700',padding:'3px 12px',borderRadius:'99px'}},['⚡ '+pw]);
  hdr.append(
    btn('← Back',()=>setState({phase:'browse'}),{variant:'secondary',sm:true}),
    el('span',{style:{fontSize:'20px'}},['☁️']),
    el('span',{style:{fontWeight:'800',fontSize:'15px',color:'#111827'}},[(os==='Windows'?'🪟':'🐧')+' '+S.selVM?.name]),
    el('span',{style:{color:'#6b7280',fontSize:'12px'}},[m.vmSize+' · '+S.selVM?.location]),
    pwBadge
  );

  const body=el('div',{style:{maxWidth:'1120px',margin:'0 auto',padding:'24px'}});

  // Score banner
  const banner=el('div',{style:{display:'grid',gridTemplateColumns:'180px 1fr',gap:'16px',marginBottom:'20px'}});
  const sc=card([
    el('div',{style:{fontSize:'11px',fontWeight:'700',color:'#6b7280',marginBottom:'8px'}},['OPTIMIZATION SCORE']),
    el('div',{style:{fontSize:'68px',fontWeight:'900',color:scC(rep.score),lineHeight:'1'}},[String(rep.score)]),
    el('div',{style:{fontSize:'12px',color:scC(rep.score),marginTop:'6px',fontWeight:'700'}},[rep.score>=80?'✅ Well Optimized':rep.score>=60?'⚠️ Needs Attention':'🔴 Needs Work']),
    el('div',{style:{marginTop:'10px',fontSize:'12px',color:'#374151'}},[`~$${rep.monthlyCost}/month`])
  ],{textAlign:'center',background:scBg(rep.score)});
  const chips=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'7px',marginBottom:'8px'}});
  rep.recs.forEach(r=>{const s=SEV[r.sev];chips.append(el('span',{style:{background:s.bg,color:s.tx,fontSize:'11px',fontWeight:'700',padding:'3px 9px',borderRadius:'99px',border:`1px solid ${s.bd}`}},[r.icon+' '+r.title]));});
  const sc2=card([el('div',{style:{fontSize:'13px',fontWeight:'700',color:'#111827',marginBottom:'10px'}},[`💡 ${rep.recs.length} Recommendations · 7-day analysis`]),chips]);
  if(rep.rs&&rep.rs.size!==m.vmSize)sc2.append(el('div',{style:{marginTop:'8px',padding:'9px 12px',background:'#f0fdf4',borderRadius:'8px',fontSize:'12px',color:'#15803d',fontWeight:'600'}},['🎯 Right-size to ',el('strong',{},[rep.rs.size]),' — '+rep.rs.reason]));
  banner.append(sc,sc2);
  body.append(banner);

  // Tabs
  const tabBar=el('div',{style:{display:'flex',gap:'3px',marginBottom:'20px',background:'white',borderRadius:'10px',padding:'5px',border:'1px solid #e5e7eb',width:'fit-content'}});
  TABS.forEach(t=>{
    const b=el('button',{className:'tab-btn'+(S.tab===t?' active':'')},[t.charAt(0).toUpperCase()+t.slice(1)]);
    b.addEventListener('click',()=>setState({tab:t}));
    tabBar.append(b);
  });
  body.append(tabBar);

  const content=el('div');

  if(S.tab==='overview'){
    const g1=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px',marginBottom:'12px'}});
    g1.append(
      statCard('Avg CPU',m.cpuAvg,'%',`Max ${m.cpuMax}% · p95 ${m.cpuP95}%`,m.cpuAvg>80?'#dc2626':m.cpuAvg<10?'#d97706':'#2563eb',m.cpuAvg>85||m.cpuAvg<5),
      statCard('Memory',m.memPct??'N/A',m.memPct?'%':'',m.memPct?'Avg 7 days':'Linux/unavailable',!m.memPct?'#9ca3af':m.memPct>85?'#dc2626':'#2563eb',m.memPct>85),
      statCard('Disk Read',m.avgDiskR,'MB/s',`${m.avgROps} avg IOPS`,'#7c3aed'),
      statCard('Disk Write',m.avgDiskW,'MB/s',`${m.avgWOps} avg IOPS`,'#7c3aed')
    );
    const g2=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px',marginBottom:'12px'}});
    g2.append(
      statCard('Data Disk R',m.avgDdR,'MB/s',`${m.avgDdROps} IOPS`,'#0891b2'),
      statCard('Data Disk W',m.avgDdW,'MB/s',`${m.avgDdWOps} IOPS`,'#0891b2'),
      statCard('Net In (7d)',m.totIn,'GB','','#059669'),
      statCard('Net Out (7d)',m.totOut,'GB','','#059669')
    );
    content.append(g1,g2,card([el('div',{style:{fontWeight:'700',fontSize:'13px',color:'#374151',marginBottom:'14px'}},['📈 CPU Utilization — Daily Trend (7 days)']),cpuTable(m.chartData)]));
  }
  if(S.tab==='cpu'){
    const g=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}});
    g.append(card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'14px'}},['📊 CPU Statistics']),barTable([{name:'Average',v:m.cpuAvg+'%'},{name:'Maximum',v:m.cpuMax+'%'},{name:'p95',v:m.cpuP95+'%'},{name:'Minimum',v:m.cpuMin+'%'}])]),
             card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'14px'}},['📈 Daily Trend']),cpuTable(m.chartData)]));
    content.append(g);
  }
  if(S.tab==='disk'){
    const g=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}});
    g.append(
      card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'14px'}},['💾 OS Disk']),barTable([{name:'Read MB/s',v:m.avgDiskR},{name:'Write MB/s',v:m.avgDiskW},{name:'Read IOPS avg',v:m.avgROps},{name:'Write IOPS avg',v:m.avgWOps},{name:'Read IOPS peak',v:m.maxROps},{name:'Write IOPS peak',v:m.maxWOps}])]),
      card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'14px'}},['📀 Data Disk']),barTable([{name:'Read MB/s',v:m.avgDdR},{name:'Write MB/s',v:m.avgDdW},{name:'Read IOPS',v:m.avgDdROps},{name:'Write IOPS',v:m.avgDdWOps}])]),
      card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'12px'}},['🗂️ Attached Disks']),
        ...disks.map((d,i)=>el('div',{style:{background:'#f8fafc',borderRadius:'8px',padding:'10px',marginBottom:'8px'}},
          [el('div',{style:{fontWeight:'700',fontSize:'13px'}},[d.name||'(unnamed)']),
           el('div',{style:{color:'#6b7280',fontSize:'12px',marginTop:'2px'}},[(d.diskSizeGB?d.diskSizeGB+' GB · ':'')+( d.managedDisk?.storageAccountType||'Unmanaged')+' · '+(i===0?'OS Disk':'Data LUN '+d.lun)])]))])
    );
    content.append(g);
  }
  if(S.tab==='network'){
    const g=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}});
    g.append(
      card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'14px'}},['🌐 7-Day Network Totals']),barTable([{name:'Inbound GB',v:m.totIn},{name:'Outbound GB',v:m.totOut}])]),
      card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'12px'}},['📡 Network Summary']),
        ...[['Total Inbound',m.totIn+' GB'],['Total Outbound',m.totOut+' GB'],['Ratio In:Out',m.totOut>0?'1:'+r2(m.totOut/Math.max(m.totIn,0.01)):'N/A'],['Est. egress','~$'+r2(m.totOut*0.087)]].map(([k,v])=>rowEl(k,v)),
        el('div',{style:{marginTop:'10px',fontSize:'11px',color:'#9ca3af'}},['* Egress at $0.087/GB (West Europe estimate)'])])
    );
    content.append(g);
  }
  if(S.tab==='recommendations'){
    const list=el('div',{style:{display:'flex',flexDirection:'column',gap:'13px'}});
    rep.recs.forEach(r=>{
      const s=SEV[r.sev];
      const inner=el('div',{style:{flex:'1'}},
        [el('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap',marginBottom:'5px'}},
          [el('span',{style:{fontWeight:'800',fontSize:'14px',color:'#111827'}},[r.icon+' '+r.title]),
           el('span',{style:{background:'#f3f4f6',color:'#374151',fontSize:'11px',fontWeight:'600',padding:'2px 7px',borderRadius:'99px'}},[r.cat])]),
         el('p',{style:{margin:'0 0 7px',fontSize:'13px',color:'#4b5563',lineHeight:'1.5'}},[r.detail]),
         el('div',{style:{fontSize:'13px',color:'#374151'}},[el('strong',{},'🎯 Action: '),r.action]),
         r.savings?el('div',{style:{marginTop:'5px',fontSize:'13px',color:'#059669',fontWeight:'700'}},['💰 '+r.savings]):null
        ].filter(Boolean));
      list.append(el('div',{style:{background:s.bg,borderRadius:'12px',border:`1px solid ${s.bd}`,padding:'18px',borderLeft:`5px solid ${s.tx}`}},
        [el('div',{style:{display:'flex',gap:'13px',alignItems:'flex-start'}},
          [el('span',{style:{background:s.tx,color:'white',fontSize:'10px',fontWeight:'800',padding:'3px 8px',borderRadius:'99px',whiteSpace:'nowrap',marginTop:'2px',flexShrink:'0'}},[s.lbl]),inner])]));
    });
    content.append(list);
  }
  if(S.tab==='details'){
    const g=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}});
    g.append(
      card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'14px'}},['🖥️ VM Configuration']),
        ...[['Name',vd?.name],['Resource Group',S.selRG],['Location',vd?.location],['VM Size',m.vmSize],['vCPU / RAM',`${m.si.v} vCPU / ${m.si.r} GB`],['OS',os],
            ['OS Disk SKU',vd?.properties?.storageProfile?.osDisk?.managedDisk?.storageAccountType||'—'],
            ['Image',vd?.properties?.storageProfile?.imageReference?.offer||'Custom'],
            ['Power State',pw],['Provisioning',vd?.properties?.provisioningState],['Est. Cost',`~$${rep.monthlyCost}/mo`]
           ].map(([k,v])=>rowEl(k,String(v||'—')))]),
      el('div',{style:{display:'flex',flexDirection:'column',gap:'16px'}},[
        card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'12px'}},['🏷️ Tags']),
          Object.keys(tags).length===0?el('div',{style:{color:'#9ca3af',fontSize:'13px'}},['⚠️ No tags found.']):
          el('div',{},[...Object.entries(tags).map(([k,v])=>rowEl(k,v))])]),
        card([el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'12px'}},['📦 Attached Disks']),
          ...disks.map((d,i)=>el('div',{style:{background:'#f8fafc',borderRadius:'8px',padding:'10px',marginBottom:'8px'}},
            [el('div',{style:{fontWeight:'700',fontSize:'13px'}},[d.name||'(unnamed)']),
             el('div',{style:{color:'#6b7280',fontSize:'12px',marginTop:'2px'}},
               [(d.diskSizeGB?d.diskSizeGB+' GB':'?')+' · '+(d.managedDisk?.storageAccountType||'Unmanaged')+' · '+(i===0?'OS Disk':'Data LUN '+d.lun)])]))])
      ])
    );
    content.append(g);
  }

  body.append(content);
  wrap.append(hdr,body);
  return wrap;
}

// ── Boot ─────────────────────────────────────────────────────
handleCallback().then(()=>render());
</script>
</body>
</html>
